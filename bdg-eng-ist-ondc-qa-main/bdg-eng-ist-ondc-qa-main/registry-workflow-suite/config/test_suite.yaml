  - name: "wf_adm"
    description: "Admin Workflow Tests (WF-ADM-01 to WF-ADM-15)"
    config_file: "wf_adm_tests.yaml"
    runner: "universal"
    test_count: 15
    enabled: true

  - name: "wf_ops"
    description: "Admin-Ops Workflow Tests (WF-OPS-01 to WF-OPS-08)"
