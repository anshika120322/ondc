# ONDC Registry Test Suite v2.0
# Main orchestration configuration

suite_info:
  name: "ONDC Registry Comprehensive Test Suite"
  version: "2.0.0"
  description: "Complete end-to-end testing for ONDC Registry Admin and V3 APIs"
  total_tests: 276
  
# Test categories
categories:
  - name: "admin"
    description: "Admin End-to-End Tests"
    config_file: "admin_tests.yaml"
    runner: "universal"
    test_count: 57
    enabled: true
    
  - name: "v3"
    description: "V3 End-to-End Tests"
    config_file: "v3_tests.yaml"
    runner: "universal"
    test_count: 27
    enabled: true
    
  - name: "combined"
    description: "Combined Admin + V3 Tests"
    config_file: "combined_tests.yaml"
    runner: "universal"
    test_count: 20
    enabled: true
    
  - name: "advanced"
    description: "Advanced Scenarios"
    config_file: "advanced_tests.yaml"
    runner: "universal"
    test_count: 15
    enabled: true
    
  - name: "integration"
    description: "Integration & Regression Tests"
    config_file: "integration_tests.yaml"
    runner: "universal"
    test_count: 15
    enabled: true
    
  - name: "negative"
    description: "Negative & Error Scenario Tests"
    config_file: "negative_tests.yaml"
    runner: "universal"
    test_count: 30
    enabled: true
    
  - name: "admin_entity"
    description: "Admin Entity CRUD Tests"
    config_file: "admin_entity_tests.yaml"
    runner: "universal"
    test_count: 63
    enabled: true

  - name: "workflow"
    description: "Subscribe API Workflow Tests (from design docs)"
    config_file: "workflow_tests.yaml"
