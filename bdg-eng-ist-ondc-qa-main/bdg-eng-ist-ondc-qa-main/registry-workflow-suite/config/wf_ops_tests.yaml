  # ===========================================================================
  # WF-OPS-08 · Unauthorized Self-Registration Attempt (Negative — Security)
  # ===========================================================================
  - id: "WF-OPS-08"
    name: "Unauthorized Self-Registration Attempt (Negative — Security)"
    description: >
      Validates that an entity which has not been whitelisted by ONDC Admin
      is unable to self-register on the network via POST /v3.0/subscribe.
      The registry must reject the attempt (401) without creating any active config records.
      Successful security validation confirms:
      1) Request is rejected with 401
      2) No participant configs are created (empty array returned)
      Mirrors WF-OPS-08 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Generate Ed25519 key pair for unauthorized entity"
        method: "POST"
        endpoint: "/utility/generate-keypair"
        auth_type: "admin"
        data: {}
        expected_status: 200
        store:
          - field: "signing.public_key"
            as: "unauth_signing_public_key"
          - field: "encryption.public_key"
            as: "unauth_encryption_public_key"

      - name: "Step 2 – Attempt self-subscribe without admin whitelist (expect rejection)"
        method: "POST"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        inject_v3_key: true
        data:
          dns_skip: true
          skip_ssl_verification: true
          request_id: "{{request_id}}"
          uk_id: "unauthorized_key_wfops08"
          participant_id: "{{subscriber_id}}"
          credentials:
            - cred_id: "cred_gst_unauthorized"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "Unauthorized Entity"
            - cred_id: "cred_pan_unauthorized"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "Unauthorized Entity"
          contacts:
            - contact_id: "contact_auth_unauthorized"
              type: "AUTHORISED_SIGNATORY"
              name: "Unauthorized Signatory"
              email: "auth@unauthorized.example.com"
              phone: "+919876520800"
            - contact_id: "contact_biz_unauthorized"
              type: "BUSINESS"
              name: "Unauthorized Business"
              email: "biz@unauthorized.example.com"
              phone: "+919876520801"
          key:
            uk_id: "unauthorized_key_wfops08"
            signing_public_key: "{{unauth_signing_public_key}}"
            encryption_public_key: "{{unauth_encryption_public_key}}"
            signed_algorithm: "ED25519"
