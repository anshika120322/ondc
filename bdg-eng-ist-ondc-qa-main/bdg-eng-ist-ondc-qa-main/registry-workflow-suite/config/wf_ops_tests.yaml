# =============================================================================
# Admin-Ops Workflow Tests
# Source: docs/guides/registry-workflows.md
#
# Covers all Admin-Ops actor workflows:
#   WF-OPS-01  Rotate Registry Signing Keys
#   WF-OPS-03  Monitor System Health
#   WF-OPS-04  Query Audit Logs
#   WF-OPS-05  Test ONDC Signature Generation (Developer Tooling)
#   WF-OPS-06  Subscriber ID Change (Re-onboarding with New ID)
#   WF-OPS-07  Config Statistics and Health Dashboard
#   WF-OPS-08  Unauthorized Self-Registration Attempt (Negative — Security)
#
# Auth notation used:
#   admin  → JWT Bearer (Admin login)
#   v3     → ONDC Ed25519 Signature (NP key pair)
#   public → No authentication required
# =============================================================================

test_suite:
  name: "Admin-Ops Workflow Tests"
  category: "wf_ops"
  total_tests: 8
  description: >
    End-to-end workflow tests for all Admin-Ops use-cases defined in
    registry-workflows.md (WF-OPS-01 through WF-OPS-08).

config:
  default_timeout: 30
  retry_on_failure: false
  
  # V3 API pre-registered participant for lookup operations
  # These credentials are registered in UAT database and work with lookup API
  v3_participant_id: "test-v3-lookup-working.participant.ondc"
  v3_uk_id: "83b68b94-8fb9-44ad-bcd4-b0e89d741290"
  v3_private_key_seed: "c190934de2c9aea71b47a31bacb8f002b0e4995c083cb457c0d58b9d6ba3670f"

tests:

  # ===========================================================================
  # WF-OPS-01 · Rotate Registry Signing Keys
  # ===========================================================================
  - id: "WF-OPS-01"
    name: "Rotate Registry Signing Keys"
    description: >
      Ops team rotates the registry's own signing keys by triggering a key rotation
      that reloads keys from CSI mount or config, then verifies the new public keys
      are served. Mirrors WF-OPS-01 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Record current registry public keys before rotation"
        method: "POST"
        endpoint: "/public/keys"
        auth_type: "public"
        data: {}
        expected_status: 200
        store:
          - field: "signing_public_key"
            as: "old_signing_public_key"
          - field: "encryption_public_key"
            as: "old_encryption_public_key"
        validate:
          - field: "signing_public_key"
            exists: true
          - field: "encryption_public_key"
            exists: true

      - name: "Step 2 – Trigger key rotation (reloads keys from CSI mount or config)"
        method: "POST"
        endpoint: "/admin/keys/rotate"
        auth_type: "admin"
        data: {}
        expected_status: 200
        validate:
          - field: "status"
            value: "rotated"

      - name: "Step 3 – Verify the registry is now serving the new public keys"
        method: "POST"
        endpoint: "/public/keys"
        auth_type: "public"
        data: {}
        expected_status: 200
        validate:
          - field: "signing_public_key"
            exists: true
          - field: "encryption_public_key"
            exists: true

  # ===========================================================================
  # WF-OPS-03 · Monitor System Health
  # ===========================================================================
  - id: "WF-OPS-03"
    name: "Monitor System Health"
    description: >
      Ops or automation tooling monitors service health via Kubernetes probes,
      detailed health checks, and Prometheus metrics scraping.
      Mirrors WF-OPS-03 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Kubernetes liveness probe (confirms the process is alive)"
        method: "GET"
        endpoint: "/health/live"
        auth_type: "public"
        expected_status: 200
        validate:
          - field: "status"
            value: "alive"

      - name: "Step 2 – Readiness probe (checks database connectivity and cache availability)"
        method: "GET"
        endpoint: "/health/ready"
        auth_type: "public"
        expected_status: 200
        validate:
          - field: "status"
            value: "ready"

      - name: "Step 3 – Detailed health check with all sub-system statuses"
        method: "GET"
        endpoint: "/health"
        auth_type: "public"
        expected_status: 200
        validate:
          - field: "status"
            value: "healthy"
          - field: "checks.database"
            value: "connected"
          - field: "checks.cache"
            value: "connected"

      - name: "Step 4 – Prometheus metrics scrape (CPU, memory, request rates, error rates)"
        method: "GET"
        endpoint: "/metrics"
        auth_type: "public"
        expected_status: 200

