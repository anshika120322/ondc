  # ===========================================================================
  # WF-OPS-05 · Test ONDC Signature Generation (Developer Tooling)
  # ===========================================================================
  - id: "WF-OPS-05"
    name: "Test ONDC Signature Generation (Developer Tooling)"
    description: >
      Developer or ops verifies the ONDC signature tooling: keypair generation,
      signature generation with BLAKE-512 digest, and challenge encrypt/decrypt round-trip.
      Mirrors WF-OPS-05 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Generate a test Ed25519 key pair"
        method: "POST"
        endpoint: "/utility/generate-keypair"
        auth_type: "admin"
        data: {}
        expected_status: 200
        store:
          - field: "signing.public_key"
            as: "signing_public_key"
          - field: "signing.private_key"
            as: "signing_private_key"
          - field: "encryption.public_key"
            as: "encryption_public_key"
        validate:
          - field: "signing.public_key"
            exists: true
          - field: "signing.private_key"
            exists: true
          - field: "encryption.public_key"
            exists: true

      - name: "Step 2 – Submit a sample request body to compute BLAKE-512 digest and Ed25519 signature"
        method: "POST"
        endpoint: "/signature/generate"
        auth_type: "admin"
        data:
          subscriber_id: "test-wfops05.ondc.org"
          unique_key_id: "test_key_wfops05"
          private_key_b64: "{{signing_private_key}}"
          request_body: "{\"message\":{\"ack\":{\"status\":\"ACK\"}}}"
        expected_status: 200
        validate:
          - field: "authorization"
            exists: true
          - field: "digest"
            exists: true

      - name: "Step 3 – Encrypt a challenge string using the registry's public key"
        method: "POST"
        endpoint: "/challenge/encrypt/text"
        auth_type: "public"
        data:
          subscriber_encryption_public_key: "{{encryption_public_key}}"
          text: "{{request_id}}"
        expected_status: 200
        store:
          - field: "encrypted_text"
            as: "encrypted_challenge"
        validate:
          - field: "encrypted_text"
            exists: true

      - name: "Step 4 – Decrypt the encrypted challenge to confirm round-trip"
        method: "POST"
        endpoint: "/challenge/decrypt/text"
        auth_type: "admin"
        data:
          subscriber_encryption_public_key: "{{encryption_public_key}}"
          encrypted_text: "{{encrypted_challenge}}"
        expected_status: 200
        validate:
          - field: "decrypted_text"
            value: "{{request_id}}"

