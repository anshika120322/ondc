              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N15 Suspended Test"
          contacts:
            - contact_id: "contact_auth_n15"
              type: "AUTHORISED_SIGNATORY"
              name: "N15 Auth"
              email: "n15@example.com"
              phone: "+919876543015"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
