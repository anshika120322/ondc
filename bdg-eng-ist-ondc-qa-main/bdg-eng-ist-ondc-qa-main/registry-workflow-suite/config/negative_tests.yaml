# Negative Tests - Error Scenario Testing
# Tests error handling, validation, and edge cases
# Focus: All negative scenarios grouped by source (Admin, V3, Combined)

test_suite:
  name: "Negative Error Tests"
  category: "negative"
  total_tests: 44
  description: "Comprehensive error scenario testing for Admin API, V3 API, combined workflows, policy validation, authentication, and authorization errors"

config:
  default_timeout: 30
  retry_on_failure: false

# ==================================================================
# SECTION 1: ADMIN API NEGATIVE SCENARIOS (10 tests)
# ==================================================================

tests:
  - id: "N01"
    name: "Admin POST invalid action"
    description: "Try creating participant with INACTIVE or SUSPENDED action"
    steps:
      - name: "Attempt POST with INACTIVE action"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_action_{{timestamp}}"
          action: "INACTIVE"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_action_{{timestamp}}"
        expected_status: [400, 422]
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            equals: "ERR_16004"

  - id: "N02"
    name: "Admin POST duplicate participant_id"
    description: "Try creating participant with existing ID"
    steps:
      - name: "Create first participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "duplicate_test_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "duplicate_test_{{timestamp}}"
        expected_status: 200
      
      - name: "Attempt duplicate creation"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "duplicate_test_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET15"
              np_type: "BAP"
              subscriber_id: "duplicate_test_{{timestamp}}"
        expected_status: [409, 422]
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            equals: "ERR_17001"

  - id: "N03"
    name: "Admin POST missing required fields"
    description: "Try creating participant without required fields"
    steps:
      - name: "Missing participant_id"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
        expected_status: [400, 422]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999
      
      - name: "Missing action"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_action_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
        expected_status: [400, 422]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999
      
      - name: "Missing configs"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_configs_{{timestamp}}"
          action: "WHITELISTED"
        expected_status: [400, 422]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N04"
    name: "Admin POST invalid domain/np_type"
    description: "Try creating with invalid domain or np_type values"
    steps:
      - name: "Invalid domain"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_domain_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "INVALID:DOMAIN"
              np_type: "BPP"
              subscriber_id: "invalid_domain_{{timestamp}}"
        expected_status: [400, 422, 404]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999
      
      - name: "Invalid np_type"
        method: "POST"
