              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "Wrong Sig NP"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "wrong_sig_{{timestamp}}"
        expected_status: 401
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

