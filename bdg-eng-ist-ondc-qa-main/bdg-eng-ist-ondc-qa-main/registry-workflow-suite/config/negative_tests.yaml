        expected_status: [400, 422]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N07"
    name: "Admin PATCH non-existent participant"
    description: "Try updating participant that doesn't exist"
    steps:
      - name: "PATCH non-existent participant"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "non_existent_participant_{{timestamp}}"
          action: "INACTIVE"
        expected_status: 404
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N08"
    name: "Admin PATCH invalid status transition"
    description: "Try invalid status transitions"
    steps:
      - name: "Create WHITELISTED participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_transition_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_transition_{{timestamp}}"
        expected_status: 200
      
      - name: "Try transition to UNSUBSCRIBED (invalid from WHITELISTED)"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_transition_{{timestamp}}"
          action: "UNSUBSCRIBED"
        expected_status: [200, 400, 422]
        allow_failure: true
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N09"
    name: "Admin POST invalid key format"
    description: "Try creating with malformed cryptographic keys"
    steps:
      - name: "Invalid signing algorithm"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_key_algo_{{timestamp}}"
          action: "SUBSCRIBED"
          key:
            uk_id: "uk_n09"
            signing_public_key: "invalid_key_format"
            encryption_public_key: "invalid_key_format"
            signed_algorithm: "INVALID_ALGO"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          configs:
            - domain: "ONDC:RET1A"
