              max: 19999

  - id: "N15"
    name: "V3 PATCH on SUSPENDED participant"
    description: "Try V3 update when participant is suspended"
    steps:
      - name: "Create SUBSCRIBED participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "v3_suspended_{{timestamp}}"
