# ==================================================================
# SECTION 4: AUTHENTICATION ERRORS (401)
# ==================================================================

  - id: "N37"
    name: "Missing Authorization header (401)"
    description: "Test admin endpoint without Authorization header - expect 401"
    steps:
      - name: "Admin request without auth header"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "none"  # No authentication
        expected_status: 401
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N38"
    name: "Expired JWT token / TOKEN_EXPIRED (401)"
    description: "Test with expired JWT token (>24h lifetime) - expect 401"
    steps:
      - name: "Use expired JWT token"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "admin"
        use_expired_token: true  # Framework should inject expired token
        expected_status: [200, 401]
        allow_failure: true  # May not be implementable without token expiry control
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N39"
    name: "Key expired / KEY_EXPIRED (401)"
    description: "Test V3 request with key where valid_until has passed"
    steps:
      - name: "Admin creates participant with expired key"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "expired_key_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_expired_key"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "Expired Key Test NP"
            - cred_id: "cred_pan_expired_key"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "Expired Key Test NP"
          contacts:
            - contact_id: "contact_auth_expired"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Contact"
              email: "auth@expired.example.com"
              phone: "+919876543210"
            - contact_id: "contact_biz_expired"
              type: "BUSINESS"
              name: "Business Contact"
              email: "biz@expired.example.com"
              phone: "+919876543211"
          key:
            uk_id: "expired_key_test"
            signing_public_key: "MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyz=="
            encryption_public_key: "MCowBQYDK2VwAyEA9876543210zyxwvutsrqponmlkjihgfedcba=="
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "2024-01-01T00:00:00.000Z"
            valid_until: "2024-12-31T23:59:59.999Z"  # Expired date in past
          location:
            location_id: "loc_expired_key"
            country: "IND"
            city: ["std:080"]
            type: "SERVICEABLE"
          uri:
            uri_id: "uri_expired_key"
            type: "CALLBACK"
            url: "https://expired.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "expired_key_{{timestamp}}"
              location_id: "loc_expired_key"
              uri_id: "uri_expired_key"
              key_id: "expired_key_test"
        expected_status: [200, 201]
        allow_failure: true  # Creation may succeed

      - name: "Wait for participant indexing"
        sleep_seconds: 5

      - name: "V3 request with expired key"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        data:
          subscriber_id: "expired_key_{{timestamp}}"
          domain: "ONDC:RET1A"
        expected_status: 401
        allow_failure: true  # UAT may not validate key expiry
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N40"
    name: "Timestamp too old (401)"
