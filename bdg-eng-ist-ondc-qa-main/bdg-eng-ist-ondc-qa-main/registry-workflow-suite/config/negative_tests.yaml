        expected_status: [401, 400, 422]
        allow_failure: true
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N14"
    name: "V3 POST DNS validation failure"
    description: "Try V3 subscription with failing DNS validation"
    steps:
      - name: "Admin whitelists"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "dns_fail_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "dns_fail_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 subscribe with DNS validation enabled and invalid domain"
        method: "POST"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        query_params:
          dns_skip: "false"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "dns_fail_{{timestamp}}"
          credentials:
            - cred_id: "cred_gst_n14"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N14 DNS Test"
          contacts:
            - contact_id: "contact_auth_n14"
              type: "AUTHORISED_SIGNATORY"
              name: "N14 Auth"
              email: "n14@example.com"
              phone: "+919876543014"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_n14"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_n14"
            type: "CALLBACK"
            url: "https://nonexistent-domain-for-testing.invalid/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "dns_fail_{{timestamp}}"
              location_id: "loc_n14"
              uri_id: "uri_n14"
