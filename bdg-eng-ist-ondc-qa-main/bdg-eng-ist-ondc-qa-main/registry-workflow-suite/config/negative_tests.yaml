            in_range:
              min: 15000
              max: 19999
      
      - name: "Invalid URI format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_uri_{{timestamp}}"
          action: "SUBSCRIBED"
          uri:
            uri_id: "uri_n10"
            type: "CALLBACK"
            url: "not_a_valid_url"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_uri_{{timestamp}}"
        expected_status: [400, 422]
        validate:
