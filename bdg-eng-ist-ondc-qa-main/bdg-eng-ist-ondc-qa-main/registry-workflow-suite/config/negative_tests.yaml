            encryption_algorithm: "X25519"
            valid_from: "2020-01-01T00:00:00Z"
            valid_until: "2020-12-31T23:59:59Z"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "expired_key_{{timestamp}}"
        expected_status: [400, 422]
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N10"
    name: "Admin POST invalid location/URI format"
    description: "Try creating with malformed location or URI"
    steps:
