            in_range:
              min: 15000
              max: 19999

# ==================================================================
# SECTION 2: V3 API NEGATIVE SCENARIOS (10 tests)
# ==================================================================

  - id: "N11"
    name: "V3 POST without pre-whitelisting"
    description: "Try V3 subscription without admin whitelisting"
    steps:
      - name: "Attempt V3 subscribe without whitelist"
        method: "POST"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "not_whitelisted_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "not_whitelisted_{{timestamp}}"
        expected_status: [401, 403, 404, 400]
        allow_failure: true  # UAT may return 401 for authentication issues
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N12"
    name: "V3 POST invalid ONDC signature"
    description: "Try V3 request with invalid signature"
    steps:
      - name: "Admin whitelists participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_signature_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_signature_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 request with invalid signature"
        method: "POST"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        invalid_signature: true
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "invalid_signature_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_signature_{{timestamp}}"
        expected_status: [401, 403]
        validate:
          - field: "message.ack.status"
            equals: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

  - id: "N13"
    name: "V3 POST missing required entities"
    description: "Try V3 subscription without required entities"
    steps:
      - name: "Admin whitelists"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_entities_{{timestamp}}"
          action: "WHITELISTED"
          configs:
