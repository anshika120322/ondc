            in_range:
              min: 15000
              max: 19999
      
      - name: "Expired key validity"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "expired_key_{{timestamp}}"
          action: "SUBSCRIBED"
          key:
            uk_id: "uk_n09_expired"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
