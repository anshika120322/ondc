            url: "https://n15.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "v3_suspended_{{timestamp}}"
              location_id: "loc_n15"
              uri_id: "uri_n15"
              key_id: "{{uk_id}}"
        expected_status: [200, 400]
        allow_failure: true  # UAT may reject SUBSCRIBED action in one step
      
      - name: "Admin suspends"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "v3_suspended_{{timestamp}}"
          action: "SUSPENDED"
        expected_status: [200, 404]
        allow_failure: true  # Participant may not exist if creation failed
      
      - name: "V3 PATCH attempt (should fail)"
        method: "PATCH"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          participant_id: "v3_suspended_{{timestamp}}"
          uk_id: "{{uk_id}}"
          contacts:
