              np_type: "INVALID_TYPE"
              subscriber_id: "invalid_nptype_{{timestamp}}"
        expected_status: [200, 400, 422]
        allow_failure: true  # UAT may accept invalid np_type

  - id: "N05"
    name: "Admin POST invalid credential format"
    description: "Try creating with malformed credentials"
