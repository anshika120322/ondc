# =============================================================================
# NP Workflow Tests
# Source: docs/guides/registry-workflows.md
#
# Covers all NP-actor workflows:
#   WF-NP-00  Pre-requisite – Publish DNS TXT Records (Production Only)
#   WF-NP-01  New Network Participant Registration (Production)
#   WF-NP-02  Update Signing and Encryption Keys
#   WF-NP-03  Update Subscriber URL (Callback / API Endpoint)
#   WF-NP-04  Update Contacts
#   WF-NP-05  Add a New Domain / Network Configuration
#   WF-NP-06  Self-Restore from INACTIVE to SUBSCRIBED
#   WF-NP-07  Update Credentials (GST / PAN)
#   WF-NP-08  Update Serviceable Location / City Codes
#   WF-NP-09  New Seller App (BPP) Registration — Multi-Domain, Multi-City
#
# Auth notation used:
#   admin  → JWT Bearer (Admin login)
#   v3     → ONDC Ed25519 Signature (NP key pair)
#   public → No authentication required
#
# All tests use dns_skip: true and skip_ssl_verification: true for staging/dev
# compatibility. For production runs remove those flags and complete WF-NP-00
# DNS TXT record setup before executing WF-NP-01.
# =============================================================================

test_suite:
  name: "NP Workflow Tests"
  category: "wf_np"
  total_tests: 10
  description: >
    End-to-end workflow tests for all Network Participant (NP) use-cases
    defined in registry-workflows.md (WF-NP-00 through WF-NP-09).

config:
  default_timeout: 30
  retry_on_failure: false
  
  # V3 API pre-registered participant for lookup operations
  # These credentials are registered in UAT database and work with lookup API
  v3_participant_id: "test-v3-lookup-working.participant.ondc"
  v3_uk_id: "83b68b94-8fb9-44ad-bcd4-b0e89d741290"
  v3_private_key_seed: "c190934de2c9aea71b47a31bacb8f002b0e4995c083cb457c0d58b9d6ba3670f"

tests:

  # ===========================================================================
  # WF-NP-00 · Pre-requisite – Publish DNS TXT Records (Production Only)
  # In staging: dns_skip=true bypasses these steps; test validates the
  # utility endpoints used to PREPARE the DNS records.
  # ===========================================================================
  - id: "WF-NP-00"
    name: "Publish DNS TXT Records (Production Only)"
    description: >
      Validates the utility calls required to build DNS TXT records for production
      subscribe. Tests keypair generation, registry public key fetch, request_id signing,
      and challenge encryption. Steps 5-7 (DNS publish, dig verification, and v3.0/subscribe)
      are manual/production-only and excluded from this test.
    workflow: true
    optional: true  # Production-only: DNS and challenge verification requires real domain setup
    steps:
      - name: "Step 1 – Generate NP Ed25519 signing key pair and X25519 encryption key pair; save all four keys securely"
        method: "POST"
        endpoint: "/utility/generate-keypair"
        auth_type: "admin"
        data: {}
        expected_status: 200
        validate:
          - field: "signing.public_key"
            exists: true
          - field: "signing.private_key"
            exists: true
          - field: "encryption.public_key"
            exists: true
          - field: "encryption.private_key"
            exists: true

      - name: "Step 2 – Fetch the registry's X25519 encryption_public_key -- required to encrypt the challenge"
        method: "POST"
        endpoint: "/public/keys"
        auth_type: "public"
        data: {}
        expected_status: 200
        validate:
          - field: "encryption_public_key"
            exists: true

      - name: "Step 3 – Choose a request_id UUID; sign its raw UTF-8 bytes with the NP's Ed25519 signing private key to produce ondc-signature value"
        description: "(local computation) – This step is performed by the test framework automatically when generating V3 signatures"
        sleep_seconds: 0
        # This is a conceptual step - signing happens in the V3 auth layer when making authenticated requests

      - name: "Step 4 – Encrypt the request_id using the registry's X25519 public key + NP's X25519 private key to produce ondc-challenge value"
        method: "POST"
        endpoint: "/challenge/encrypt/text"
        auth_type: "public"
        data:
          subscriber_encryption_public_key: "{{encryption_public_key}}"
          text: "{{request_id}}"
        expected_status: 200
        validate:
          - field: "encrypted_challenge"
            exists: true

  # ===========================================================================
  # WF-NP-01 · New Network Participant Registration (Production flow)
  # Step 1: Admin whitelists → Step 2: NP self-subscribes → Step 3: Verify discoverability
  # ===========================================================================
  - id: "WF-NP-01"
    name: "New Network Participant Registration (Production)"
    description: >
      Canonical production onboarding: Admin whitelists the subscriber_id first;
      the NP then calls POST /v3.0/subscribe with full payload to reach SUBSCRIBED;
      finally NP verifies it is discoverable via lookup. Mirrors WF-NP-01 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Admin whitelists the NP (action=WHITELISTED) -- creates the participant record in WHITELISTED state"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Step 2 – NP self-subscribes with full payload (credentials, contacts, key, location, URI, configs) -- transitions to SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        data:
          dns_skip: true
          skip_ssl_verification: true
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "{{subscriber_id}}"
          credentials:
            - cred_id: "cred_gst_wfnp01"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "WF-NP-01 New NP Private Limited"
            - cred_id: "cred_pan_wfnp01"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "WF-NP-01 New NP Private Limited"
          contacts:
            - contact_id: "contact_auth_wfnp01"
              name: "WF-NP-01 Authorised Signatory"
              email: "auth@wfnp01.example.com"
              phone: "+919876500100"
              type: "AUTHORISED_SIGNATORY"
            - contact_id: "contact_biz_wfnp01"
              name: "WF-NP-01 Business Contact"
              email: "biz@wfnp01.example.com"
              phone: "+919876500101"
              type: "BUSINESS"
            - contact_id: "contact_tech_wfnp01"
              name: "WF-NP-01 Technical Contact"
              email: "tech@wfnp01.example.com"
              phone: "+919876500102"
              type: "TECHNICAL"
              designation: "Technical Lead"
          key:
            - uk_id: "{{uk_id}}"
              signing_public_key: "{{signing_public_key}}"
              encryption_public_key: "{{encryption_public_key}}"
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{valid_from}}"
              valid_until: "{{valid_until}}"
          location:
            - location_id: "loc_wfnp01"
              country: "IND"
              city:
                - "std:080"
                - "std:022"
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri_wfnp01"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfnp01"
              uri_id: "uri_wfnp01"
              key_id: "{{uk_id}}"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Wait for participant propagation in UAT"
        sleep_seconds: 10

      - name: "Step 3 – NP verifies it is discoverable in the network (optional confirmation step)"
        method: "POST"
        endpoint: "/v2.0/lookup"
        auth_type: "v3_lookup"
        data:
          subscriber_id: "{{subscriber_id}}"
          domain: "ONDC:RET1A"
          country: "IND"
          city: "std:080"
        expected_status: 200
        validate:
          - field: "0.subscriber_id"
            value: "{{subscriber_id}}"
          - field: "0.status"
            value: "SUBSCRIBED"

  # ===========================================================================
  # WF-NP-02 · Update Signing and Encryption Keys (Key Rotation)
  # ===========================================================================
  - id: "WF-NP-02"
    name: "Update Signing and Encryption Keys"
    description: >
      NP rotates its Ed25519 signing and X25519 encryption keys. Admin pre-creates
      a subscribed participant; NP looks up its current key, generates new key pair,
      patches with new uk_id, and confirms new keys are live. Mirrors WF-NP-02 from
      registry-workflows.md.
    workflow: true
    inject_v3_key: true
    # Use pre-configured v3 key instead of generating random keys
    use_v3_lookup_key: true
    setup_steps:
      - name: "Precondition – Admin creates subscribed participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_wfnp02"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "WF-NP-02 Key Rotation NP"
            - cred_id: "cred_pan_wfnp02"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "WF-NP-02 Key Rotation NP"
          contacts:
            - contact_id: "contact_auth_wfnp02"
              type: "AUTHORISED_SIGNATORY"
              name: "WF-NP-02 Signatory"
              email: "auth@wfnp02.example.com"
              phone: "+919876500200"
            - contact_id: "contact_biz_wfnp02"
              type: "BUSINESS"
              name: "WF-NP-02 Business"
              email: "biz@wfnp02.example.com"
              phone: "+919876500201"
          key:
            - uk_id: "{{uk_id}}"
              signing_public_key: "{{signing_public_key}}"
              encryption_public_key: "{{encryption_public_key}}"
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{valid_from}}"
              valid_until: "{{valid_until}}"
          location:
            - location_id: "loc_wfnp02"
              country: "IND"
              city: ["std:080"]
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri_wfnp02"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfnp02"
              uri_id: "uri_wfnp02"
              key_id: "{{uk_id}}"
        expected_status: 200

      - name: "Wait for participant propagation in UAT"
        sleep_seconds: 10

    steps:
      - name: "Step 1 – Look up current uk_id and public key for the participant"
        method: "POST"
        endpoint: "/v2.0/lookup"
        auth_type: "v3_lookup"
        data:
          subscriber_id: "{{subscriber_id}}"
          domain: "ONDC:RET1A"
          country: "IND"
          city: "std:080"
        expected_status: 200
        validate:
          - field: "0.subscriber_id"
            value: "{{subscriber_id}}"
          - field: "0.signing_public_key"
            exists: true
          - field: "0.ukId"
            exists: true

      - name: "Step 2 – Generate a fresh Ed25519 + X25519 key pair (returned only, never stored)"
        method: "POST"
        endpoint: "/utility/generate-keypair"
        auth_type: "admin"
        data: {}
        expected_status: 200
        store:
          - field: "signing.public_key"
            as: "new_signing_public_key"
          - field: "signing.private_key"
            as: "new_signing_private_key"
          - field: "encryption.public_key"
            as: "new_encryption_public_key"
          - field: "encryption.private_key"
            as: "new_encryption_private_key"
        validate:
          - field: "signing.public_key"
            exists: true
          - field: "signing.private_key"
            exists: true
          - field: "encryption.public_key"
            exists: true
          - field: "encryption.private_key"
            exists: true

      - name: "Step 3 – Submit new uk_id and public keys via key block; old key remains valid until its valid_until expires"
        method: "PATCH"
        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        generate_uuid_as: "uk_id_new"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          key:
            - uk_id: "{{uk_id_new}}"
              signing_public_key: "{{new_signing_public_key}}"
              encryption_public_key: "{{new_encryption_public_key}}"
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{valid_from}}"
              valid_until: "{{valid_until}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfnp02"
              uri_id: "uri_wfnp02"
              key_id: "{{uk_id_new}}"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Wait for key rotation propagation in UAT"
        sleep_seconds: 40

      - name: "Step 4 – Confirm the new uk_id and public keys are live in the registry"
        method: "POST"
        endpoint: "/v2.0/lookup"
        auth_type: "v3_lookup"
        retry:
          count: 5
          delay_seconds: 8
          until_status: 200
        data:
          subscriber_id: "{{subscriber_id}}"
          domain: "ONDC:RET1A"
          country: "IND"
          city: "std:080"
        expected_status: 200
        continue_on_failure: true
        validate:
          - field: "0.subscriber_id"
            value: "{{subscriber_id}}"
          - field: "0.status"
            value: "SUBSCRIBED"
          - field: "0.signing_public_key"
            exists: true

