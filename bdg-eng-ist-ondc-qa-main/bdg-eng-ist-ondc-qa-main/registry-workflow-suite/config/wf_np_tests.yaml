          key:
            - uk_id: "{{uk_id}}"
              signing_public_key: "{{signing_public_key}}"
              encryption_public_key: "{{encryption_public_key}}"
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{valid_from}}"
              valid_until: "{{valid_until}}"
          location:
            - location_id: "loc_wfnp03"
              country: "IND"
              city: ["std:080"]
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri_wfnp03"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfnp03"
              uri_id: "uri_wfnp03"
              key_id: "{{uk_id}}"
        expected_status: 200

      - name: "Wait for participant propagation in UAT"
        sleep_seconds: 10

      - name: "Step 1 – Retrieve current uri_id and url for the participant"
        method: "POST"
        endpoint: "/v2.0/lookup"
        auth_type: "v3_lookup"
        data:
          subscriber_id: "{{subscriber_id}}"
          domain: "ONDC:RET1A"
          country: "IND"
          city: "std:080"
        expected_status: 200
        validate:
          - field: "0.subscriber_id"
            value: "{{subscriber_id}}"
          - field: "0.subscriber_url"
