# V3 End-to-End Test Configuration
# 27 comprehensive tests for V3 API flows with ONDC signature authentication

test_suite:
  name: "V3 End-to-End Tests"
  category: "v3"
  total_tests: 27
  description: "Complete V3 API testing with ONDC Ed25519 signature auth, self-subscribe, updates, validations, and admin WHITELISTED config upsert"

# Test configuration
config:
  auth_type: "v3"
  default_timeout: 30
  retry_on_failure: false

# ==========================================
# 2.1 V3 SELF-SUBSCRIBE (4 tests)
