        endpoint: "/v3.0/subscribe"
        auth_type: "v3"
        data:
          dns_skip: true
          skip_ssl_verification: true
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "{{subscriber_id}}"
          credentials:
            - cred_id: "cred001"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "Test Company Private Limited"
            - cred_id: "cred002"
              type: "PAN"
              cred_data:
                pan_no: "ABCDE1234F"
          contacts:
            - contact_id: "contact001"
              name: "Test Contact"
              email: "contact@example.com"
              phone: "+919876543210"
              type: "AUTHORISED_SIGNATORY"
            - contact_id: "contact002"
              name: "Business Contact"
              email: "business@example.com"
              phone: "+919876543211"
              type: "BUSINESS"
          key:
            - uk_id: "{{uk_id}}"
              signing_public_key: "{{signing_public_key}}"
              encryption_public_key: "{{encryption_public_key}}"
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{valid_from}}"
              valid_until: "{{valid_until}}"
          location:
            - location_id: "loc001"
              country: "IND"
              city: ["std:080"]
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri001"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc001"
              uri_id: "uri001"
