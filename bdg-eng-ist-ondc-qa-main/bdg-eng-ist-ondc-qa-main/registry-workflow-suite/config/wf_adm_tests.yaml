  # ===========================================================================
  # WF-ADM-15 · Error-125 Recovery (Duplicate Subscriber ID – PATCH Retry)
  # ===========================================================================
  - id: "WF-ADM-15"
    name: "Error-125 Recovery (Duplicate Subscriber ID – PATCH Retry)"
    description: >
      When POST /admin/subscribe fails with error 125/137/181/185 (subscriber
      already exists), the system retries using PATCH with action=SUBSCRIBED.
      Mirrors WF-ADM-15 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Precondition – Admin POST whitelist/subscribe – first create (succeeds)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
        expected_status: 200

      - name: "Step 1 – Attempt duplicate POST (triggers error 125 / 409)"
        # Posting whitelist again for the same subscriber_id must return 409 Conflict.
        # This validates the trigger condition for the retry path described in WF-ADM-15.
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
        expected_status: 409  # error 125 / 181 – Subscriber id already exists
        validate:
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

      - name: "Step 2 – Error-125 retry: Admin PATCH (action=SUBSCRIBED)"
        # Per WF-ADM-15: when POST returns 125, switch to PATCH with action=SUBSCRIBED.
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_wfadm15"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "WF-ADM-15 Error Recovery NP"
            - cred_id: "cred_pan_wfadm15"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "WF-ADM-15 Error Recovery NP"
          contacts:
            - contact_id: "contact_auth_wfadm15"
              type: "AUTHORISED_SIGNATORY"
              name: "WF-ADM-15 Signatory"
              email: "auth@wfadm15.example.com"
              phone: "+919876511500"
            - contact_id: "contact_biz_wfadm15"
              type: "BUSINESS"
              name: "WF-ADM-15 Business"
              email: "biz@wfadm15.example.com"
              phone: "+919876511501"
          key:
            - uk_id: "wfadm15_key"
              signing_public_key: "MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1015=="
              encryption_public_key: "MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAzyxwvutsrqponmlkjihgfedcba1015=="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "2026-01-01T00:00:00.000Z"
              valid_until: "2027-01-01T00:00:00.000Z"
          location:
            - location_id: "loc_wfadm15"
              country: "IND"
              city: ["std:080"]
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri_wfadm15"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfadm15"
              uri_id: "uri_wfadm15"
              key_id: "wfadm15_key"
        expected_status: 200

      - name: "Step 3 – Confirm participant status is SUBSCRIBED"
        method: "GET"
        endpoint: "/admin/participants/{{subscriber_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            value: "{{subscriber_id}}"
          - field: "np_type"
            contains: "BPP"
