# =============================================================================
# Admin Workflow Tests
# Source: docs/guides/registry-workflows.md
#
# Covers all Admin-actor workflows:
#   WF-ADM-01  Direct Participant Onboarding to SUBSCRIBED (Pre-prod / Staging)
#   WF-ADM-02  Whitelist a Participant (First Step of Production Onboarding)
#   WF-ADM-03  Suspend a Participant
#   WF-ADM-04  Reactivate a Suspended Participant
#   WF-ADM-05  Unsubscribe a Participant
#   WF-ADM-06  Add / Modify Contacts for a Participant
#   WF-ADM-07  Add / Modify Credentials for a Participant
#   WF-ADM-08  Add / Modify Locations for a Participant
#   WF-ADM-09  Manage Subscriber URIs for a Participant
#   WF-ADM-10  Manage Participant Keys
#   WF-ADM-11  Create and Manage a Domain
#   WF-ADM-12  Manage Network Policies
#   WF-ADM-13  Manage Network Configurations (NP-Domain Mappings)
#   WF-ADM-14  Manage Enumeration Values
#   WF-ADM-15  Error-125 Recovery (Duplicate Subscriber ID – PATCH Retry)
#
# Auth notation used:
#   admin  → JWT Bearer (Admin login)
#   v3     → ONDC Ed25519 Signature (NP key pair)
#   public → No authentication required
# =============================================================================

test_suite:
  name: "Admin Workflow Tests"
  category: "wf_adm"
  total_tests: 15
  description: >
    End-to-end workflow tests for all Administrator use-cases defined in
    registry-workflows.md (WF-ADM-01 through WF-ADM-15).

config:
  default_timeout: 30
  retry_on_failure: false

tests:

  # ===========================================================================
  # WF-ADM-01 · Direct Participant Onboarding to SUBSCRIBED (Pre-prod / Staging)
  # ===========================================================================
  - id: "WF-ADM-01"
    name: "Direct Participant Onboarding to SUBSCRIBED"
    description: >
      Admin creates a fully SUBSCRIBED participant in a single call with
      action=SUBSCRIBED, bypassing the separate NP self-subscribe step.
      Mirrors WF-ADM-01 from registry-workflows.md.
    workflow: true
    steps:
      - name: "Step 1 – Admin POST (action=SUBSCRIBED) with full payload"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_wfadm01"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "WF-ADM-01 Staging NP Private Limited"
            - cred_id: "cred_pan_wfadm01"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "WF-ADM-01 Staging NP Private Limited"
          contacts:
            - contact_id: "contact_auth_wfadm01"
              type: "AUTHORISED_SIGNATORY"
              name: "WF-ADM-01 Signatory"
              email: "auth@wfadm01.example.com"
              phone: "+919876510100"
            - contact_id: "contact_biz_wfadm01"
              type: "BUSINESS"
              name: "WF-ADM-01 Business"
              email: "biz@wfadm01.example.com"
              phone: "+919876510101"
            - contact_id: "contact_tech_wfadm01"
              type: "TECHNICAL"
              name: "WF-ADM-01 Technical"
              email: "tech@wfadm01.example.com"
              phone: "+919876510102"
              designation: "Technical Lead"
          key:
            - uk_id: "wfadm01_key"
              signing_public_key: "MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1001=="
              encryption_public_key: "MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAzyxwvutsrqponmlkjihgfedcba1001=="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "2026-01-01T00:00:00.000Z"
              valid_until: "2027-01-01T00:00:00.000Z"
          location:
            - location_id: "loc_wfadm01"
              country: "IND"
              city:
                - "std:080"
                - "std:022"
              type: "SERVICEABLE"
          uri:
            - uri_id: "uri_wfadm01"
              type: "CALLBACK"
              url: "{{participant_url}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_wfadm01"
              uri_id: "uri_wfadm01"
              key_id: "wfadm01_key"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Step 2 – Verify participant status is SUBSCRIBED"
        method: "GET"
        endpoint: "/admin/participants/{{subscriber_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            value: "{{subscriber_id}}"
          - field: "np_type"
            contains: "BPP"

      - name: "Wait for lookup indexing"
        sleep_seconds: 5

      - name: "Step 3 – Confirm participant is discoverable via lookup"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        data:
          subscriber_id: "{{subscriber_id}}"
          domain: "ONDC:RET1A"
        expected_status: 200
        # Note: Newly created participants may need time to be indexed for lookup

