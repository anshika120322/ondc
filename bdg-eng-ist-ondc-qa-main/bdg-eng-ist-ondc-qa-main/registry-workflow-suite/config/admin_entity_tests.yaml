# Admin Entity CRUD Tests
# Tests CRUD operations for all entity endpoints
# Focus: Participants, Keys, Credentials, Contacts, Locations, URIs, Configs

test_suite:
  name: "Admin Entity CRUD Tests"
  category: "admin_entity"
  total_tests: 63
  description: "Comprehensive CRUD testing for all Admin API entity endpoints"

config:
  default_timeout: 30
  retry_on_failure: false

# ==================================================================
# SECTION 1: PARTICIPANTS CRUD (5 tests)
# ==================================================================

tests:
  - id: "AE01"
    name: "Participant GET by ID"
    description: "Retrieve participant by participant_id"
    workflow: true
    steps:
      - name: "Create participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          participant_id: "ae01_participant_{{timestamp}}"
          action: "SUBSCRIBED"
          skip_ssl_verification: true
          credentials:
            - cred_id: "cred_gst_ae01"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "AE01 Participant Test"
            - cred_id: "cred_pan_ae01"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "AE01 Participant Test"
          contacts:
            - contact_id: "contact_auth_ae01"
              type: "AUTHORISED_SIGNATORY"
              name: "AE01 Auth"
              email: "ae01@example.com"
              phone: "+919876543001"
            - contact_id: "contact_biz_ae01"
              type: "BUSINESS"
              name: "AE01 Business Manager"
              email: "ae01-business@example.com"
              phone: "+919876543101"
          key:
            - uk_id: "uk_ae01"
              signing_public_key: "MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789=="
              encryption_public_key: "MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAzyxwvutsrqponmlkjihgfedcba=="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "2026-02-04T00:00:00.000Z"
              valid_until: "2027-02-04T00:00:00.000Z"
          location:
            - location_id: "loc_ae01"
              type: "SERVICEABLE"
              country: "IND"
              city: ["std:080"]
          uri:
            - uri_id: "uri_ae01"
              type: "CALLBACK"
              url: "https://ae01.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "ae01_participant_{{timestamp}}"
              location_id: "loc_ae01"
              uri_id: "uri_ae01"
              key_id: "uk_ae01"
        expected_status: 200
      
      - name: "GET participant by ID"
        method: "GET"
        endpoint: "/admin/participants/ae01_participant_{{timestamp}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
