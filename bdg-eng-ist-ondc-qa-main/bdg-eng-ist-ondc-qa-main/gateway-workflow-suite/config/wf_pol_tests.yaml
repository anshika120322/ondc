  # ===========================================================================
  # WF-POL-15 · Participant FIS12 Allow Override Matrix
  #
  # Goal: Verify allow overrides for lsp1_fis and lsp2_fis permit access to
  #       ACME-FINANCE-FIS despite an active default FIS12 deny posture.
  #
  # Pre-requisites: ACME-FINANCE-FIS, LSP1-FIS, LSP2-FIS are SUBSCRIBED for ONDC:FIS12.
  #                 Default deny + explicit allow overrides are created here.
  # Action matrix (20): search, on_search, select, on_select, init, on_init,
  #   confirm, on_confirm, status, on_status, cancel, on_cancel, update, on_update,
  #   support, on_support, track, on_track, rating, on_rating → ACK for lsp1_fis and lsp2_fis.
  # Teardown: deactivate ALLOW override + default-deny policy.
  # ===========================================================================

  - id: "WF-POL-15"
    name: "Participant FIS12 Allow Override Matrix (NETWORK_PARTICIPANT Policy)"
    description: >
      A default-deny policy is created for ACME-FINANCE-FIS on ONDC:FIS12.
      Explicit ALLOW override policies are created for lsp1_fis and lsp2_fis.
      Each LSP sends all 20 covered FIS12 actions; each must return ACK.
      At teardown, the allow-override and default-deny policies are deactivated.
    workflow: true

    steps:


      # ── Step 1: Register lsp1_fis ──────────────────────────────────────
      - name: "Step 1 – Admin: Register LSP1-FIS as SUBSCRIBED for ONDC:FIS12"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{lsp1_fis_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{lsp1_fis_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "LSP1-FIS Policy Test"
            - cred_id: "cred-pan-{{lsp1_fis_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "LSP1-FIS Policy Test"
          contacts:
            - contact_id: "contact-auth-{{lsp1_fis_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@lsp1-fis.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{lsp1_fis_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@lsp1-fis.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{lsp1_fis_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@lsp1-fis.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{lsp1_fis_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{lsp1_fis_valid_from}}"
              valid_until: "{{lsp1_fis_valid_until}}"
          location:
            - location_id: "loc-{{lsp1_fis_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{lsp1_fis_uk_id}}"
              type: "CALLBACK"
              url: "{{lsp1_fis_uri}}"
          configs:
            - domain: "{{lsp1_fis_domain}}"
              np_type: "BAP"
              subscriber_id: "{{lsp1_fis_id}}"
              location_id: "loc-{{lsp1_fis_uk_id}}"
