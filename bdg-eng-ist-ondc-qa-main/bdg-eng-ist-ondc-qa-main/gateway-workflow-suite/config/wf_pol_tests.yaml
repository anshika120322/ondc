# =============================================================================
# Gateway Policy Enforcement Tests — gateway-workflow-suite
# Source: design_docs/Workflow Scenarios Docs/ONDC-Gateway-Workflow-Scenarios.md
#
# Implemented:
#   WF-POL-01  NETWORK Policy Block                        [implemented]
#   WF-POL-02  NETWORK_PARTICIPANT Block (BPP blocks BAP)  [implemented]
#   WF-POL-03  NETWORK_PARTICIPANT Block (BAP blocks BPP)  [implemented]
# =============================================================================

test_suite:
  name: "Gateway Policy Enforcement Tests"
  category: "policy"
  total_tests: 3
  description: >
    Verifies that the Gateway enforces NETWORK and NETWORK_PARTICIPANT policies —
    blocking requests to restricted domains/actions, excluding blocked BPPs from
    direct-route and broadcast dispatch, and excluding blocked BPPs when the BAP
    holds a NOT_ALLOW policy.

config:
  default_timeout: 30
  retry_on_failure: false

