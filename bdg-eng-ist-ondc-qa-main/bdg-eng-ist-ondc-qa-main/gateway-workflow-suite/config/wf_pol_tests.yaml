  # ===========================================================================
  # WF-POL-14 · Participant FIS12 Default Deny Matrix
  #
  # Goal: Verify the FIS12 participant policy default deny blocks
  #       non-whitelisted access to ACME-FINANCE-FIS across all covered actions.
  #
  # Steps (31):
  #   1–2   Register bap_fis_deny (BAP) and acme_finance_fis (BPP)
  #   3–4   Lookup each — confirm SUBSCRIBED
  #   5     BG Lookup
  #   6     Create default-deny policy
  #   7     Admin confirm active (GET by ID)
  #   8–27  20-action NACK matrix
  #   28    Fan-out search → ACK (silent exclusion)
  #   29    Teardown (is_expired: true)
  #   30    Admin verify deactivated
  #   31    Post-teardown enforcement verify
  # ===========================================================================

  - id: "WF-POL-14"
    name: "Participant FIS12 Default Deny Matrix (NETWORK_PARTICIPANT Policy)"
    description: >
      A NETWORK_PARTICIPANT policy with default_action DENY is created for
      acme_finance_fis on ONDC:FIS12. bap_fis_deny (not in the allow list) sends
      one request per covered action. Each must return NACK. The policy is
      deactivated at teardown.
    workflow: true

    steps:

      # ── Step 1: Register bap_fis_deny ─────────────────────────────────────
      - name: "Step 1 – Admin: Register BAP-FIS-DENY as SUBSCRIBED for ONDC:FIS12"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_fis_deny_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_fis_deny_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP FIS Deny Policy Test"
            - cred_id: "cred-pan-{{bap_fis_deny_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP FIS Deny Policy Test"
          contacts:
            - contact_id: "contact-auth-{{bap_fis_deny_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-fis-deny.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_fis_deny_uk_id}}"
