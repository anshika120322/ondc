        validate:
          - field: "policies.0.type"
            value: "NETWORK_PARTICIPANT"
          - field: "policies.0.is_active"
            value: true
        post_wait_seconds: 5

      # ── Step 5b: Registry v3 lookup — confirm bap_pol SUBSCRIBED ───────────
      # Confirms bap_pol is SUBSCRIBED in the Registry prior to the
      # broadcast Gateway call in Step 7.
      - name: "Step 5b – Registry: Lookup BAP-POL-001 via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        use_base_url: true
        data:
          subscriber_id: "{{bap_pol_id}}"
          country: "IND"
          domain: "ONDC:LOG10"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"
      # ── Step 6: Gateway internal — policy evaluation ─────────────────────────
      - name: "Step 6 – Gateway internal: Evaluate BAP policies; exclude BPP-POL-BLOCKED from dispatch"
        method: "INTERNAL"
        post_wait_seconds: 5

      # ── Step 7: bap_pol sends broadcast search ───────────────────────────────
      - name: "Step 7 – Gateway: BAP-POL-001 sends broadcast search — expect ACK; bpp_pol_blocked excluded"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 8: bpp_pol_allowed sends on_search ──────────────────────────────
      - name: "Step 8 – Gateway: BPP-POL-ALLOWED sends on_search (unblocked BPP responds) — expect ACK"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_pol_allowed"
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_allowed_id}}"
            bpp_uri: "{{bpp_pol_allowed_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-POL-ALLOWED Store"
              providers:
                - id: "provider-pol-allowed"
                  descriptor:
                    name: "POL Allowed Provider"
                  items:
                    - id: "item-pol-allowed-001"
                      descriptor:
                        name: "Policy Test Item"
                      price:
                        currency: "INR"
                        value: "100.00"
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 8b: bpp_pol_blocked attempts on_search ───────────────────────────────
      # BAP-POL-001 holds NOT_ALLOW against BPP-POL-BLOCKED (sender-side block).
      # BPP-POL-BLOCKED was excluded from dispatch; it now attempts on_search.
      # Gateway must reject it (NACK — error code in Gateway range 10000-14999) if the NP policy covers the reverse path.
      - name: "Step 8b – Gateway: BPP-POL-BLOCKED attempts on_search — expect NACK (excluded from dispatch)"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_pol_blocked"
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_blocked_id}}"
            bpp_uri: "{{bpp_pol_blocked_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-POL-BLOCKED Store"
              providers: []
        expected_status: [200, 400, 401, 403]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            in_range:
              min: 10000
              max: 14999

      - name: "Step 9 – Validation: bpp_pol_blocked excluded from broadcast; bpp_pol_allowed dispatched normally"
        method: "INTERNAL"
        validates:
          - step_contains: "BAP-POL-001 sends broadcast search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-POL-ALLOWED sends on_search (unblocked BPP responds)"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-POL-BLOCKED attempts on_search"
            expect: "passed"
            expected_outcome: "Rejected (NACK — Gateway error range 10000-14999)"
            fail_outcome: "Accepted (ACK) — reverse-path policy not enforced"

      # ── Teardown ───────────────────────────────────────────────────
      - name: "Step 10 – Teardown: Deactivate NOT_ALLOW policy on BAP-POL-001"
        method: "PATCH"
        endpoint: "/admin/participants/{{bap_pol_id}}/policies/policy-np-block-bap-{{bap_pol_uk_id}}"
        auth_type: "admin"
        data:
          is_active: false
        expected_status: [200, 404]
        continue_on_failure: true
        post_wait_seconds: 5

      # ── Post-teardown verify: policy no longer blocks ───────────────────
      # Re-run the on_search from bpp_pol_blocked that was blocked — now expect ACK.
      - name: "Step 11 – Post-Teardown Verify: bpp-pol-blocked on_search — expect ACK (policy inactive)"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_pol_blocked"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_blocked_id}}"
            bpp_uri: "{{bpp_pol_blocked_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog: {}
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"


  # ===========================================================================
  # WF-POL-04 · Type4 Search Matrix
  #
  # Goal: Type4 NETWORK policy (ONDC:TRV11) allows broadcast search (no bpp_id)
  #       but blocks direct search (bpp_id present).
  #
  # Core assertions:
  #   Step 4  POST /search (no bpp_id)           → ACK  (fan-out allowed)
  #   Step 5  POST /search (bpp_id=bpp_t4_001)   → NACK 40300 (direct blocked)
  # ===========================================================================

  - id: "WF-POL-04"
    name: "Type4 Search Matrix (NETWORK Policy)"
    description: >
      Type4 NETWORK policy is active for ONDC:TRV11.
      Broadcast search (no bpp_id) must be accepted and fanned out.
      Direct search (bpp_id present) must be blocked with NACK 40300.
    workflow: true

    steps:

      # ── Step 1: Register bap_t4 ──────────────────────────────────────────────
      - name: "Step 1 – Admin: Register BAP-T4-001 as SUBSCRIBED for ONDC:TRV11"
