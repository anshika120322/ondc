      # ── Teardown ─────────────────────────────────────────────────────────────
      - name: "Step 7 – Teardown: Deactivate Type4 NETWORK policy"
        method: "PATCH"
        endpoint: "/admin/participants/{{gateway_participant_id}}/policies/policy-type4-trv11-wf-pol-04-{{run_id}}"
        auth_type: "admin"
