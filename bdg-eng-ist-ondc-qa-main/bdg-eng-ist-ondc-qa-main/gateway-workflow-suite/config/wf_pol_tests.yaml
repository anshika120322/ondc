tests:

  # ===========================================================================
  # WF-POL-01 · NETWORK Policy Block
  #
  # Goal: A NETWORK-level policy is created and then tested to verify the Gateway
  #       rejects requests for the blocked domain (ONDC:FIS12) before dispatching.
  #
  # Core assertions:
  #   Step 3  Create NETWORK BLOCK policy for bap-pol-fis (FIS12 participant)
  #   Step 4  Admin GET confirms policy active on bap-pol-fis
  #   Step 6  BAP sends search for blocked domain → expected NACK/rejection
  # ===========================================================================

  - id: "WF-POL-01"
    name: "NETWORK Policy Block (NETWORK Policy)"
    description: >
      A NETWORK policy blocking ONDC:FIS12 is confirmed via admin API.
      bap-pol-fis (registered for ONDC:FIS12) sends a search for the blocked domain.
      The Gateway must evaluate the NETWORK policy and reject the request before
      dispatching to any BPP. All participants generated fresh per run.
    workflow: true

    steps:

      # ── Step 1: Register bap_pol_fis as SUBSCRIBED ───────────────────────────
      - name: "Step 1 – Admin: Register bap-pol-fis as SUBSCRIBED (for blocked domain ONDC:FIS12)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_pol_fis_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_pol_fis_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP POL FIS Network Policy Test"
            - cred_id: "cred-pan-{{bap_pol_fis_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP POL FIS Network Policy Test"
          contacts:
            - contact_id: "contact-auth-{{bap_pol_fis_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-pol-fis.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_pol_fis_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-pol-fis.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_pol_fis_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-pol-fis.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_pol_fis_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_pol_fis_valid_from}}"
              valid_until: "{{bap_pol_fis_valid_until}}"
          location:
            - location_id: "loc-{{bap_pol_fis_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_pol_fis_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_pol_fis_uri}}"
          configs:
            - domain: "{{bap_pol_fis_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_pol_fis_id}}"
              location_id: "loc-{{bap_pol_fis_uk_id}}"
              uri_id: "uri-{{bap_pol_fis_uk_id}}"
              key_id: "{{bap_pol_fis_uk_id}}"
        expected_status: [200, 409]
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 2: Confirm bap_pol_fis SUBSCRIBED ───────────────────────────────
      - name: "Step 2 – Admin: Confirm bap-pol-fis is SUBSCRIBED for ONDC:FIS12"
        method: "GET"
        endpoint: "/admin/participants/{{bap_pol_fis_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            exists: true

      # ── Step 2b: Registry v3 lookup — confirm bap_pol_fis SUBSCRIBED ─────────
      # Independent confirmation from the same endpoint the Gateway uses.
      # Signed by bap_pol_fis itself — it was registered in Step 1.
      # retry: polls every 1s for up to 15s to allow registry propagation.
      - name: "Step 2b – Registry: Lookup bap-pol-fis via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        use_base_url: true
        data:
          subscriber_id: "{{bap_pol_fis_id}}"
          country: "IND"
          domain: "ONDC:FIS12"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Pre-req: Resolve gateway_participant_id from registry ─────────────────
      - name: "Pre-req – Registry: Lookup BG participant — store as gateway_participant_id"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        use_base_url: true
        data:
          subscriber_id: "{{bg_lookup_subscriber_id}}"
          country: "{{bg_lookup_country}}"
          type: "{{bg_lookup_type}}"
        expected_status: [200]
        continue_on_failure: true
        store:
          - field: "0.participant_id"
            as: "gateway_participant_id"

      # ── Step 3: Create NETWORK policy blocking ONDC:FIS12 ───────────────────
      # NETWORK policies are owned by the gateway participant, not a BAP/BPP.
      # {{gateway_subscriber_id}} is a built-in variable = gateway hostname.
      - name: "Step 3 – Admin: Create NETWORK policy blocking ONDC:FIS12 domain (search/init/confirm)"
        method: "POST"
        endpoint: "/admin/policies"
        auth_type: "admin"
        continue_on_failure: true
        data:
          policy_id: "policy-block-fis12-wf-pol-01-{{run_id}}"
          name: "Block ONDC:FIS12 domain"
          description: "NETWORK firewall: block ONDC:FIS12 search/init/confirm at gateway level"
          participant_id: "{{gateway_participant_id}}"
          type: "NETWORK"
          is_active: true
          priority: 100
          rule_definition:
            default_action: "BLOCK"
            rules:
              - id: "rule-block-fis12-001"
                description: "Block search on ONDC:FIS12 domain"
                priority: 100
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:FIS12"
                  action: "search"
                action_to_take:
                  action_type: "BLOCK"
              - id: "rule-block-fis12-002"
                description: "Block init on ONDC:FIS12 domain"
                priority: 100
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:FIS12"
                  action: "init"
                action_to_take:
                  action_type: "BLOCK"
              - id: "rule-block-fis12-003"
                description: "Block confirm on ONDC:FIS12 domain"
                priority: 100
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:FIS12"
                  action: "confirm"
                action_to_take:
                  action_type: "BLOCK"
        expected_status: [200, 201, 409]

      # ── Step 3b: Ensure policy is active (re-activate if it existed already) ─
      # On 409 the policy exists but may have been left inactive by teardown.
      - name: "Step 3b – Admin: Activate NETWORK policy (ensure is_active=true)"
        method: "PATCH"
        endpoint: "/admin/participants/{{gateway_participant_id}}/policies/policy-block-fis12-wf-pol-01-{{run_id}}"
        auth_type: "admin"
        data:
          is_active: true
        expected_status: [200, 201]
        continue_on_failure: true

      # ── Step 4: Confirm NETWORK policy is active on gateway participant ───────
      - name: "Step 4 – Admin: Confirm NETWORK policy is active on gateway participant"
        method: "GET"
        endpoint: "/admin/participants/{{gateway_participant_id}}/policies"
        auth_type: "admin"
        expected_status: [200, 404]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "policies.*.type"
            contains: "NETWORK"
          - field: "policies.*.is_active"
            contains: true

      # ── Step 5: Gateway internal — NETWORK policy evaluation ─────────────────
      - name: "Step 5 – Gateway internal: Evaluate NETWORK policy for domain — match found; request blocked"
        method: "INTERNAL"

      # ── Step 6: bap-pol-fis sends search for blocked domain ──────────────────
      # NETWORK policy has default_action: BLOCK — all unmatched traffic is also blocked.
      # The explicit rule BLOCKs ONDC:FIS12 search. Gateway must NACK with error in range 10000-14999.
      # retry: poll every 5s for up to 60s until gateway propagates the policy and returns NACK.
      - name: "Step 6 – Gateway: bap-pol-fis sends search for ONDC:FIS12 — expect NACK (policy blocked)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        retry:
          timeout_seconds: 60
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:FIS12"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_fis_id}}"
            bap_uri: "{{bap_pol_fis_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 400, 401, 403]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            in_range:
              min: 10000
              max: 14999

      # ── Step 7: Validation ───────────────────────────────────────────────────
      - name: "Step 7 – Validation: NETWORK policy enforced; gateway rejected ONDC:FIS12 search with NACK"
        method: "INTERNAL"
        validates:
          - step_contains: "Create NETWORK policy blocking ONDC:FIS12 domain"
            expect: "passed"
            expected_outcome: "Policy created (201/409)"
            fail_outcome: "Policy creation failed"
          - step_contains: "Confirm NETWORK policy is active on gateway participant"
            expect: "passed"
            expected_outcome: "Policy confirmed in admin API (type=NETWORK, is_active=true)"
            fail_outcome: "Policy not found in admin API"
          - step_contains: "bap-pol-fis sends search for ONDC:FIS12"
            expect: "passed"
            expected_outcome: "Rejected (NACK — Gateway error range 10000-14999)"
            fail_outcome: "Accepted (ACK) — policy not enforced"

      # ── Step 8: Teardown — deactivate NETWORK policy (prevent test bleed) ────
      # Deactivate the NETWORK policy so it doesn’t accumulate and block
      # unrelated RET10 traffic in subsequent WF-POL-02/03 tests via default_action.
      - name: "Step 8 – Teardown: Deactivate NETWORK policy on {{gateway_participant_id}}"
        method: "PATCH"
        endpoint: "/admin/participants/{{gateway_participant_id}}/policies/policy-block-fis12-wf-pol-01-{{run_id}}"
        auth_type: "admin"
        data:
          is_active: false
          is_expired: true
        expected_status: [200, 201, 404]
        continue_on_failure: true

      # ── Step 8b: Post-teardown admin verify — confirm policy is inactive ──────
      - name: "Step 8b – Admin: Verify NETWORK policy is_active=false after teardown"
        method: "GET"
        endpoint: "/admin/participants/{{gateway_participant_id}}/policies/policy-block-fis12-wf-pol-01-{{run_id}}"
        auth_type: "admin"
        expected_status: [200, 404]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "policy_id"
            value: "policy-block-fis12-wf-pol-01-{{run_id}}"
          - field: "is_active"
            value: false
          - field: "is_expired"
            value: true

      # ── Step 9: Post-teardown verify — policy no longer blocks ───────────────
      # Re-run the same search that was blocked — now expect ACK (policy inactive).
      - name: "Step 9 – Post-Teardown Verify: bap-pol-fis search ONDC:FIS12 — expect ACK (policy inactive)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:FIS12"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_fis_id}}"
            bap_uri: "{{bap_pol_fis_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 9b: Post-teardown verify — /init no longer blocked ──────────────
      - name: "Step 9b – Post-Teardown Verify: bap-pol-fis init ONDC:FIS12 — expect ACK (policy inactive)"
        method: "POST"
        action: "init"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:FIS12"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_fis_id}}"
            bap_uri: "{{bap_pol_fis_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            order: {}
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 9c: Post-teardown verify — /confirm no longer blocked ────────────
      - name: "Step 9c – Post-Teardown Verify: bap-pol-fis confirm ONDC:FIS12 — expect ACK (policy inactive)"
        method: "POST"
        action: "confirm"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol_fis"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:FIS12"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_fis_id}}"
            bap_uri: "{{bap_pol_fis_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            order: {}
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"


  # ===========================================================================
  # WF-POL-02 · NETWORK_PARTICIPANT Block (BPP blocks BAP)
  #
  # Goal: BPP holds a NOT_ALLOW policy against the BAP. Gateway excludes the
  #       BPP from direct-route and broadcast dispatch from that BAP.
  #
  # Core assertions:
  #   Step 5  Admin GET confirms NOT_ALLOW policy on bpp_pol_blocked
  #   Step 7  bap_pol direct search to bpp_pol_blocked → expected NACK/rejection
  #   Step 10 bap_pol broadcast → bpp_pol_allowed responds; bpp_pol_blocked absent
  # ===========================================================================

  - id: "WF-POL-02"
    name: "NETWORK_PARTICIPANT Block — BPP blocks BAP (NETWORK_PARTICIPANT Policy)"
    description: >
      BPP-POL-BLOCKED holds a NOT_ALLOW NETWORK_PARTICIPANT policy against
      BAP-POL-001. For a direct-route search targeting BPP-POL-BLOCKED, the
      Gateway must return NACK. For a broadcast from BAP-POL-001, BPP-POL-BLOCKED
      is silently excluded while BPP-POL-ALLOWED (no policy) receives dispatch
      and responds normally.
    workflow: true

    steps:

      # ── Step 1: Register all participants as SUBSCRIBED ──────────────────────
      - name: "Step 1 – Admin: Register BAP-POL-001 as SUBSCRIBED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_pol_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_pol_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP POL Policy Test BAP"
            - cred_id: "cred-pan-{{bap_pol_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP POL Policy Test BAP"
          contacts:
            - contact_id: "contact-auth-{{bap_pol_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-pol.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_pol_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-pol.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_pol_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-pol.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_pol_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_pol_valid_from}}"
              valid_until: "{{bap_pol_valid_until}}"
          location:
            - location_id: "loc-{{bap_pol_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_pol_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_pol_uri}}"
          configs:
            - domain: "{{bap_pol_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_pol_id}}"
              location_id: "loc-{{bap_pol_uk_id}}"
              uri_id: "uri-{{bap_pol_uk_id}}"
              key_id: "{{bap_pol_uk_id}}"
        expected_status: [200, 409]
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Step 2 – Admin: Register BPP-POL-ALLOWED as SUBSCRIBED (continues to receive dispatch)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_pol_allowed_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_pol_allowed_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP POL Allowed Normal Target"
            - cred_id: "cred-pan-{{bpp_pol_allowed_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP POL Allowed Normal Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_pol_allowed_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-pol-allowed.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_pol_allowed_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-pol-allowed.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_pol_allowed_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-pol-allowed.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_pol_allowed_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_pol_allowed_valid_from}}"
              valid_until: "{{bpp_pol_allowed_valid_until}}"
          location:
            - location_id: "loc-{{bpp_pol_allowed_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_pol_allowed_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_pol_allowed_uri}}"
          configs:
            - domain: "{{bpp_pol_allowed_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_pol_allowed_id}}"
              location_id: "loc-{{bpp_pol_allowed_uk_id}}"
              uri_id: "uri-{{bpp_pol_allowed_uk_id}}"
              key_id: "{{bpp_pol_allowed_uk_id}}"
        expected_status: [200, 409]
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Step 3 – Admin: Register BPP-POL-BLOCKED as SUBSCRIBED (will have NOT_ALLOW policy)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_pol_blocked_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_pol_blocked_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP POL Blocked Policy Target"
            - cred_id: "cred-pan-{{bpp_pol_blocked_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP POL Blocked Policy Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_pol_blocked_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-pol-blocked.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_pol_blocked_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-pol-blocked.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_pol_blocked_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-pol-blocked.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_pol_blocked_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_pol_blocked_valid_from}}"
              valid_until: "{{bpp_pol_blocked_valid_until}}"
          location:
            - location_id: "loc-{{bpp_pol_blocked_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_pol_blocked_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_pol_blocked_uri}}"
          configs:
            - domain: "{{bpp_pol_blocked_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_pol_blocked_id}}"
              location_id: "loc-{{bpp_pol_blocked_uk_id}}"
              uri_id: "uri-{{bpp_pol_blocked_uk_id}}"
              key_id: "{{bpp_pol_blocked_uk_id}}"
        expected_status: [200, 409]
        validate:
          - field: "message.ack.status"
            value: "ACK"
        post_wait_seconds: 5

      # ── Step 3b: Registry v3 lookup — confirm bpp_pol_allowed SUBSCRIBED ─────
      - name: "Step 3b – Registry: Lookup BPP-POL-ALLOWED via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        use_base_url: true
        data:
          subscriber_id: "{{bpp_pol_allowed_id}}"
          country: "IND"
          domain: "ONDC:LOG10"
          type: "BPP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Step 3c: Registry v3 lookup — confirm bpp_pol_blocked SUBSCRIBED ─────
      - name: "Step 3c – Registry: Lookup BPP-POL-BLOCKED via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        use_base_url: true
        data:
          subscriber_id: "{{bpp_pol_blocked_id}}"
          country: "IND"
          domain: "ONDC:LOG10"
          type: "BPP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Pre-req: Resolve gateway_participant_id from registry ─────────────────
      - name: "Pre-req – Registry: Lookup BG participant — store as gateway_participant_id"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bpp_pol_allowed"
        use_base_url: true
        data:
          subscriber_id: "{{bg_lookup_subscriber_id}}"
          country: "{{bg_lookup_country}}"
          type: "{{bg_lookup_type}}"
        expected_status: [200]
        continue_on_failure: true
        store:
          - field: "0.participant_id"
            as: "gateway_participant_id"
            
      # ── Step 4: Create NOT_ALLOW policy on bpp_pol_blocked ───────────────────
      # BPP-POL-BLOCKED sets NOT_ALLOW for bap_pol's subscriber_id.
      - name: "Step 4 – Admin: Create NOT_ALLOW policy on BPP-POL-BLOCKED for BAP-POL-001"
        method: "POST"
        endpoint: "/admin/policies"
        auth_type: "admin"
        continue_on_failure: true
        data:
          policy_id: "policy-np-block-{{bpp_pol_blocked_uk_id}}"
          name: "BPP-POL-BLOCKED blocks BAP-POL-001"
          description: "BPP holds NOT_ALLOW policy against BAP-POL-001 for ONDC:LOG10"
          participant_id: "{{bpp_pol_blocked_id}}"
          type: "NETWORK_PARTICIPANT"
          is_active: true
          priority: 100
          rule_definition:
            rules:
              - id: "rule-np-block-bpp-001"
                description: "BPP blocks BAP-POL-001 on all actions"
                priority: 200
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:LOG10"
                  bap_id: "{{bap_pol_id}}"
                  bpp_id: "{{bpp_pol_blocked_id}}"
                action_to_take:
                  action_type: "NOT_ALLOW"
        expected_status: [200, 201, 409]

      # ── Step 4c: Activate policy + propagation wait ──────────────────────────
      - name: "Step 4c – Admin: Activate NOT_ALLOW policy (ensure is_active=true)"
        method: "PATCH"
        endpoint: "/admin/participants/{{bpp_pol_blocked_id}}/policies/policy-np-block-{{bpp_pol_blocked_uk_id}}"
        auth_type: "admin"
        data:
          is_active: true
        expected_status: [200, 201]
        continue_on_failure: true
        post_wait_seconds: 5

      # ── Step 5: Confirm NOT_ALLOW policy is active ───────────────────────────
      - name: "Step 5 – Admin: Confirm NOT_ALLOW policy is active on BPP-POL-BLOCKED"
        method: "GET"
        endpoint: "/admin/participants/{{bpp_pol_blocked_id}}/policies"
        auth_type: "admin"
        expected_status: [200, 404]
        continue_on_failure: true
        validate:
          - field: "policies.0.type"
            value: "NETWORK_PARTICIPANT"
          - field: "policies.0.is_active"
            value: true
        post_wait_seconds: 5

      # ── Step 5b: Registry v3 lookup — confirm bap_pol SUBSCRIBED ───────────
      # Confirms bap_pol is SUBSCRIBED in the Registry (signer verification
      # will succeed) prior to the direct-route and broadcast Gateway calls.
      - name: "Step 5b – Registry: Lookup BAP-POL-001 via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        use_base_url: true
        data:
          subscriber_id: "{{bap_pol_id}}"
          country: "IND"
          domain: "ONDC:LOG10"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"
      # ── Step 6: Gateway internal — policy evaluation ─────────────────────────
      - name: "Step 6 – Gateway internal: Evaluate NETWORK_PARTICIPANT policy — BPP-POL-BLOCKED excluded"
        method: "INTERNAL"
        post_wait_seconds: 5

      # ── Step 8: BAP-POL-001 sends route search to BPP-POL-BLOCKED ──────────
      # Route search (bpp_id present) targets BPP-POL-BLOCKED directly.
      # BPP-POL-BLOCKED holds NOT_ALLOW against BAP-POL-001 — gateway must
      # evaluate the NP policy for this specific pair and return NACK 40300.
      - name: "Step 8 – Gateway: BAP-POL-001 sends route search to BPP-POL-BLOCKED — expect NACK 10030"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        retry:
          timeout_seconds: 60
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_blocked_id}}"
            bpp_uri: "{{bpp_pol_blocked_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 400, 401, 403]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            in_range:
              min: 10000
              max: 14999

      # ── Step 9: BAP-POL-001 sends route search to BPP-POL-ALLOWED ───────────
      # Same BAP, different target — BPP-POL-ALLOWED has no blocking policy.
      # Gateway must accept and forward. Confirms policy is pair-specific.
      - name: "Step 9 – Gateway: BAP-POL-001 sends route search to BPP-POL-ALLOWED — expect ACK (no blocking policy)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_allowed_id}}"
            bpp_uri: "{{bpp_pol_allowed_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 9b: BAP-POL-001 sends fan-out search (no bpp_id) ────────────────
      # Broadcast search — Gateway builds fan-out dispatch list.
      # BPP-POL-BLOCKED must be silently excluded; BPP-POL-ALLOWED unaffected.
      - name: "Step 9b – Gateway: BAP-POL-001 sends fan-out search (no bpp_id) — expect ACK (BPP-POL-BLOCKED excluded from dispatch)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 10: Validation ──────────────────────────────────────────────────
      - name: "Step 10 – Validation: BPP-side NP policy enforced on route search and fan-out; pair-specific block confirmed"
        method: "INTERNAL"
        validates:
          - step_contains: "Create NOT_ALLOW policy on BPP-POL-BLOCKED for BAP-POL-001"
            expect: "passed"
            expected_outcome: "Policy created (201/409)"
            fail_outcome: "Policy creation failed"
          - step_contains: "Confirm NOT_ALLOW policy is active on BPP-POL-BLOCKED"
            expect: "passed"
            expected_outcome: "Policy confirmed (type=NETWORK_PARTICIPANT, is_active=true)"
            fail_outcome: "Policy not found in admin API"
          - step_contains: "BAP-POL-001 sends route search to BPP-POL-BLOCKED"
            expect: "passed"
            expected_outcome: "Rejected (NACK 10030)"
            fail_outcome: "Accepted (ACK) — BPP-side NP policy not enforced on route search"
          - step_contains: "BAP-POL-001 sends route search to BPP-POL-ALLOWED"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected — policy incorrectly applied to unblocked pair"
          - step_contains: "BAP-POL-001 sends fan-out search (no bpp_id)"
            expect: "passed"
            expected_outcome: "Accepted (ACK) — BPP-POL-BLOCKED excluded from fan-out dispatch"
            fail_outcome: "Rejected (NACK) — fan-out search should not be blocked entirely"

      # ── Teardown ───────────────────────────────────────────────────
      - name: "Step 11 – Teardown: Deactivate NOT_ALLOW policy on BPP-POL-BLOCKED"
        method: "PATCH"
        endpoint: "/admin/participants/{{bpp_pol_blocked_id}}/policies/policy-np-block-{{bpp_pol_blocked_uk_id}}"
        auth_type: "admin"
        data:
          is_active: false
        expected_status: [200, 404]
        continue_on_failure: true
        post_wait_seconds: 5

      # ── Post-teardown verify: policy no longer blocks ───────────────────
      # Re-run the same route search that was blocked — now expect ACK.
      - name: "Step 12 – Post-Teardown Verify: bap-pol-001 → bpp-pol-blocked route search — expect ACK (policy inactive)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_pol"
        retry:
          timeout_seconds: 15
          interval_seconds: 5
        data:
          context:
            domain: "ONDC:LOG10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_pol_id}}"
            bap_uri: "{{bap_pol_uri}}"
            bpp_id: "{{bpp_pol_blocked_id}}"
            bpp_uri: "{{bpp_pol_blocked_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"


  # ===========================================================================
  # WF-POL-03 · NETWORK_PARTICIPANT Block (BAP blocks BPP)
  #
  # Goal: BAP holds a NOT_ALLOW policy against a specific BPP. The Gateway
  #       excludes that BPP from any broadcast dispatches sourced from this BAP.
  #
  # Core assertions:
  #   Step 4  Admin GET confirms NOT_ALLOW policy on bap_pol for bpp_pol_blocked
  #   Step 7  bap_pol broadcast → bpp_pol_allowed responds; bpp_pol_blocked absent
  # ===========================================================================

  - id: "WF-POL-03"
    name: "NETWORK_PARTICIPANT Block — BAP blocks BPP (NETWORK_PARTICIPANT Policy)"
    description: >
      BAP-POL-001 holds a NOT_ALLOW NETWORK_PARTICIPANT policy against
      BPP-POL-BLOCKED. A broadcast search from BAP-POL-001 must not dispatch to
