      # ── Step 3pre: Create Type4 NETWORK policy for ONDC:TRV11 ────────────────
      # Type4: broadcast search (no bpp_id) → BROADCAST; direct search (bpp_id) → BLOCK.
      # default_action: BLOCK catches anything not explicitly allowed.
      - name: "Step 3pre – Admin: Create Type4 NETWORK policy for ONDC:TRV11"
        method: "POST"
        endpoint: "/admin/policies"
        auth_type: "admin"
        continue_on_failure: true
        data:
          policy_id: "policy-type4-trv11-wf-pol-04-{{run_id}}"
          name: "Type4 NETWORK policy for ONDC:TRV11"
          description: "Type4: broadcast search allowed, direct search blocked for ONDC:TRV11"
          participant_id: "{{gateway_participant_id}}"
          type: "NETWORK"
          is_active: true
          priority: 100
          rule_definition:
            default_action: "BLOCK"
            rules:
              - id: "rule-t4-broadcast-001"
                description: "Allow broadcast search (no bpp_id) for TRV11"
                priority: 200
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:TRV11"
                  action: "search"
                action_to_take:
                  action_type: "BROADCAST"
              - id: "rule-t4-direct-block-001"
                description: "Block direct search (bpp_id present) for TRV11"
                priority: 300
                status: "ENABLED"
                match_condition:
                  domain: "ONDC:TRV11"
                  action: "search"
                  bpp_id: "?"
                action_to_take:
                  action_type: "BLOCK"
        expected_status: [200, 201, 409]

