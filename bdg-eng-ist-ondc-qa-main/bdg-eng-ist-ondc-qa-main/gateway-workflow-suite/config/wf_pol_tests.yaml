                - "std:080"
          uri:
            - uri_id: "uri-{{bap_t4_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_t4_uri}}"
          configs:
            - domain: "{{bap_t4_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_t4_id}}"
              location_id: "loc-{{bap_t4_uk_id}}"
              uri_id: "uri-{{bap_t4_uk_id}}"
              key_id: "{{bap_t4_uk_id}}"
        expected_status: [200, 409]
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 2: Register bpp_t4_001 ──────────────────────────────────────────
      - name: "Step 2 – Admin: Register BPP-T4-001 as SUBSCRIBED for ONDC:TRV11"
