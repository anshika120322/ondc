  # WF-PROP-03 · New-Participant Registration Propagation
  #
  # Goal: A brand new BPP self-registers (subscribe) after test starts.
  #       Gateway propagates the new registration. A subsequent broadcast from
  #       the BAP reaches the newly registered BPP.
  #
  # Core assertions:
  #   Step 3  Baseline search before new BPP exists — expect ACK
  #   Step 4  New BPP registers (admin/subscribe or self-subscribe)
  #   Step 6  Post-registration search → ACK; bpp_prop_new receives dispatch
  #   Step 7  bpp_prop_new sends on_search successfully
