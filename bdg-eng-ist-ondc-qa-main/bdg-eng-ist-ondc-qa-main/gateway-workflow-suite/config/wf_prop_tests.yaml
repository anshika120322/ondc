# =============================================================================
# Gateway Registry Propagation Tests — gateway-workflow-suite
# Source: design_docs/Workflow Scenarios Docs/ONDC-Gateway-Workflow-Scenarios.md
#
# Implemented:
#   WF-PROP-01  Inactive-Status Propagation                [implemented]
#   WF-PROP-02  Policy-Change Propagation                  [implemented]
#   WF-PROP-03  New-Participant Registration Propagation   [implemented]
#   WF-PROP-04  Re-Activation Propagation                  [implemented]
#   WF-PROP-05  Full Consistency Check                     [implemented]
# =============================================================================

test_suite:
  name: "Gateway Registry Propagation Tests"
  category: "propagation"
  total_tests: 5
  description: >
    Verifies that the Gateway correctly propagates state changes — participant
    status transitions (SUBSCRIBED ↔ INACTIVE), new-participant registrations,
    and policy additions — so that subsequent requests reflect the updated state
    without any stale-cache artefacts.

config:
  default_timeout: 30
  retry_on_failure: false

# ---------------------------------------------------------------------------
# Participants
# ---------------------------------------------------------------------------
participants:
  # bap_prop — Primary BAP used across all propagation tests.
  - alias: "bap_prop"
    subscriber_id_prefix: "bap-prop-001"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_prop_active — BPP that starts SUBSCRIBED and remains so.
  - alias: "bpp_prop_active"
    subscriber_id_prefix: "bpp-prop-active"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_prop_inactive — BPP that transitions SUBSCRIBED → INACTIVE (WF-PROP-01/05)
  # and back to SUBSCRIBED (WF-PROP-04).
  - alias: "bpp_prop_inactive"
    subscriber_id_prefix: "bpp-prop-inactive"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_prop_new — BPP registered mid-test to verify new-participant propagation
  # (WF-PROP-03). Not pre-registered; registered dynamically inside the test.
  - alias: "bpp_prop_new"
    subscriber_id_prefix: "bpp-prop-new"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_prop_blocked — BPP that receives a NOT_ALLOW policy mid-test (WF-PROP-02).
  - alias: "bpp_prop_blocked"
    subscriber_id_prefix: "bpp-prop-blocked"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

tests:

  # ===========================================================================
  # WF-PROP-01 · Inactive-Status Propagation
  #
  # Goal: SUBSCRIBED BPP transitions to INACTIVE. Subsequent search from a BAP
  #       returns ACK (Gateway responds immediately) but the INACTIVE BPP is not
  #       included in any downstream dispatch. A follow-up Gateway request from
  #       the INACTIVE BPP (on_search) is rejected.
  #
  # Core assertions:
  #   Step 4  Baseline search → ACK; bpp_prop_inactive included
  #   Step 7  bpp_prop_inactive PATCH INACTIVE propagation
  #   Step 8  New search → ACK; bpp_prop_inactive absent from dispatch
  #   Step 9  bpp_prop_inactive on_search attempt → NACK HTTP 200 + error.code 10008
  # ===========================================================================

  - id: "WF-PROP-01"
    name: "Inactive-Status Propagation"
    description: >
      BAP-PROP-001 and BPP-PROP-INACTIVE are both SUBSCRIBED. Baseline search
      confirms BPP-PROP-INACTIVE appears in dispatch. Admin sets BPP-PROP-INACTIVE
      to INACTIVE. Gateway propagates the change. A subsequent search from BAP-PROP-001
      no longer dispatches to BPP-PROP-INACTIVE. Any Gateway request from the now-INACTIVE
      BPP is rejected.
    workflow: true

    steps:

      # ── Steps 1-2: Register participants as SUBSCRIBED ────────────────────────
      - name: "Step 1 – Admin: Register BAP-PROP-001 as SUBSCRIBED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_prop_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_prop_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP PROP Propagation Test BAP"
            - cred_id: "cred-pan-{{bap_prop_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP PROP Propagation Test BAP"
          contacts:
            - contact_id: "contact-auth-{{bap_prop_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-prop.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_prop_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-prop.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_prop_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-prop.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_prop_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_prop_valid_from}}"
              valid_until: "{{bap_prop_valid_until}}"
          location:
            - location_id: "loc-{{bap_prop_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_prop_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_prop_uri}}"
          configs:
            - domain: "{{bap_prop_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_prop_id}}"
              location_id: "loc-{{bap_prop_uk_id}}"
              uri_id: "uri-{{bap_prop_uk_id}}"
              key_id: "{{bap_prop_uk_id}}"
        expected_status: [200, 409]

      - name: "Step 2 – Admin: Register BPP-PROP-INACTIVE as SUBSCRIBED (baseline: active)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_prop_inactive_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_prop_inactive_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP PROP Inactive Propagation Target"
            - cred_id: "cred-pan-{{bpp_prop_inactive_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP PROP Inactive Propagation Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_prop_inactive_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-prop-inactive.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_prop_inactive_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-prop-inactive.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_prop_inactive_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-prop-inactive.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_prop_inactive_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_prop_inactive_valid_from}}"
              valid_until: "{{bpp_prop_inactive_valid_until}}"
          location:
            - location_id: "loc-{{bpp_prop_inactive_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_prop_inactive_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_prop_inactive_uri}}"
          configs:
            - domain: "{{bpp_prop_inactive_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_prop_inactive_id}}"
              location_id: "loc-{{bpp_prop_inactive_uk_id}}"
              uri_id: "uri-{{bpp_prop_inactive_uk_id}}"
              key_id: "{{bpp_prop_inactive_uk_id}}"
        expected_status: [200, 409]

      # ── Step 3: Confirm both SUBSCRIBED ──────────────────────────────────────
      - name: "Step 3 – Admin: Confirm both BAP-PROP-001 and BPP-PROP-INACTIVE are SUBSCRIBED (baseline)"
        method: "GET"
        endpoint: "/admin/participants/{{bpp_prop_inactive_id}}"
        auth_type: "admin"
        expected_status: 200
        post_wait_seconds: 5
        validate:
          - field: "participant_id"
            exists: true

      # ── Step 3b: Registry lookup — confirm bpp_prop_inactive is SUBSCRIBED ────
      - name: "Step 3b – Registry: Lookup bpp_prop_inactive via /v3.0/lookup — expect SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_prop"
        use_base_url: true
        data:
          subscriber_id: "{{bpp_prop_inactive_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BPP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Step 4: Baseline search — bpp_prop_inactive included ─────────────────
      - name: "Step 4 – Gateway: Baseline search from BAP-PROP-001 — expect ACK (bpp_prop_inactive included)"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_prop"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_prop_id}}"
            bap_uri: "{{bap_prop_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 5: bpp_prop_inactive responds (baseline on_search) ──────────────
      - name: "Step 5 – Gateway: BPP-PROP-INACTIVE sends baseline on_search (SUBSCRIBED) — expect ACK"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_prop_inactive"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_prop_id}}"
            bap_uri: "{{bap_prop_uri}}"
            bpp_id: "{{bpp_prop_inactive_id}}"
            bpp_uri: "{{bpp_prop_inactive_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-PROP-INACTIVE Store (Baseline)"
              providers:
                - id: "provider-prop-inactive"
                  descriptor:
                    name: "Propagation Inactive Provider"
                  items:
                    - id: "item-prop-inactive-001"
                      descriptor:
                        name: "Propagation Test Item"
                      price:
                        currency: "INR"
                        value: "150.00"
        expected_status: [200, 202, 500]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 6: Admin PATCH bpp_prop_inactive → INACTIVE ─────────────────────
      - name: "Step 6 – Admin: PATCH BPP-PROP-INACTIVE status to INACTIVE (trigger propagation)"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        continue_on_failure: true
        data:
          participant_id: "{{bpp_prop_inactive_id}}"
          action: "INACTIVE"
        expected_status: [200, 204]
        post_wait_seconds: 5

      # ── Step 7: Confirm Registration still exists after INACTIVE (Admin) ───────
      - name: "Step 7 – Admin: Confirm BPP-PROP-INACTIVE registration exists after INACTIVE patch"
        method: "GET"
        endpoint: "/admin/participants/{{bpp_prop_inactive_id}}"
        auth_type: "admin"
        continue_on_failure: true
        expected_status: 200
        post_wait_seconds: 5
        validate:
          - field: "participant_id"
            exists: true

      # ── Step 7b: Registry lookup — confirm bpp_prop_inactive is INACTIVE ──────
      - name: "Step 7b – Registry: Lookup bpp_prop_inactive via /v3.0/lookup — expect INACTIVE"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_prop"
        use_base_url: true
        data:
          subscriber_id: "{{bpp_prop_inactive_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BPP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "INACTIVE"

      # ── Step 8: Gateway internal — propagation of INACTIVE status ─────────────
      - name: "Step 8 – Gateway internal: Status change propagated; BPP-PROP-INACTIVE excluded from dispatch list"
        method: "INTERNAL"

      # ── Step 9: Post-propagation search — bpp_prop_inactive absent ────────────
      - name: "Step 9 – Gateway: Post-INACTIVE search from BAP-PROP-001 — expect ACK; bpp_prop_inactive absent from dispatch"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_prop"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_prop_id}}"
            bap_uri: "{{bap_prop_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 10: bpp_prop_inactive on_search attempt → NACK HTTP 200 + error.code 10008 ──
      - name: "Step 10 – Gateway: BPP-PROP-INACTIVE (now INACTIVE) sends on_search — expect NACK (error 10008)"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_prop_inactive"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_prop_id}}"
            bap_uri: "{{bap_prop_uri}}"
            bpp_id: "{{bpp_prop_inactive_id}}"
            bpp_uri: "{{bpp_prop_inactive_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-PROP-INACTIVE Store (After INACTIVE)"
              providers: []
        expected_status: [200]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            value: "10008"

      # ── Step 11: Validation ───────────────────────────────────────────────────
      - name: "Step 11 – Validation: INACTIVE propagation confirmed; BPP-PROP-INACTIVE blocked from dispatch and Gateway"
        method: "INTERNAL"
        validates:
          - step_contains: "Post-INACTIVE search from BAP-PROP-001"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-PROP-INACTIVE (now INACTIVE) sends on_search"
            expect: "passed"
            expected_outcome: "Rejected (NACK)"
            fail_outcome: "Accepted (ACK)"


  # ===========================================================================
  # WF-PROP-02 · Policy-Change Propagation
  #
  # Goal: A new NOT_ALLOW policy is applied on a BPP after baseline search.
  #       Subsequent broadcast no longer dispatches to that BPP.
  #
  # Core assertions:
  #   Step 4  Baseline broadcast → bpp_prop_blocked included
  #   Step 6  Policy created: NOT_ALLOW on bpp_prop_blocked for bap_prop
  #   Step 8  Post-policy broadcast → bpp_prop_blocked absent
  # ===========================================================================

  - id: "WF-PROP-02"
    name: "Policy-Change Propagation"
    description: >
      BAP-PROP-001, BPP-PROP-ACTIVE, and BPP-PROP-BLOCKED are all SUBSCRIBED.
      Baseline broadcast confirms BPP-PROP-BLOCKED appears in dispatch.
      A NOT_ALLOW NETWORK_PARTICIPANT policy is created on BPP-PROP-BLOCKED
      for BAP-PROP-001. Gateway propagates the policy change.
      A subsequent broadcast from BAP-PROP-001 excludes BPP-PROP-BLOCKED
      while BPP-PROP-ACTIVE continues to receive dispatch normally.
    workflow: true

    steps:

      - name: "Step 1 – Admin: Register BAP-PROP-001 as SUBSCRIBED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_prop_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_prop_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP PROP Propagation Test BAP"
            - cred_id: "cred-pan-{{bap_prop_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP PROP Propagation Test BAP"
          contacts:
            - contact_id: "contact-auth-{{bap_prop_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-prop.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_prop_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-prop.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_prop_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-prop.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_prop_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_prop_valid_from}}"
              valid_until: "{{bap_prop_valid_until}}"
          location:
            - location_id: "loc-{{bap_prop_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_prop_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_prop_uri}}"
          configs:
            - domain: "{{bap_prop_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_prop_id}}"
              location_id: "loc-{{bap_prop_uk_id}}"
              uri_id: "uri-{{bap_prop_uk_id}}"
              key_id: "{{bap_prop_uk_id}}"
        expected_status: [200, 409]

      - name: "Step 2 – Admin: Register BPP-PROP-ACTIVE as SUBSCRIBED (will remain in dispatch always)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_prop_active_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_prop_active_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP PROP Active Normal Target"
            - cred_id: "cred-pan-{{bpp_prop_active_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP PROP Active Normal Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_prop_active_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-prop-active.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_prop_active_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-prop-active.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_prop_active_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-prop-active.example.com"
              phone: "+919876543212"
          key:
