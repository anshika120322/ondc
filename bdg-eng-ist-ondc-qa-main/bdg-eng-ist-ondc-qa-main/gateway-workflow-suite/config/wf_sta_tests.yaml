# =============================================================================
# Gateway Participant Status Enforcement Tests — gateway-workflow-suite
# Source: design_docs/Workflow Scenarios Docs/ONDC-Gateway-Workflow-Scenarios.md
#
# Implemented:
#   WF-STA-01  Inactive BAP Blocked                    [implemented]
#   WF-STA-02  Inactive BPP Hidden from Broadcast      [implemented]
#   WF-STA-03  Suspended Participant Blocked            [implemented]
#   WF-STA-04  Unregistered Participant Rejected        [implemented]
# =============================================================================

test_suite:
  name: "Gateway Participant Status Enforcement Tests"
  category: "status"
  total_tests: 4
  description: >
    Verifies that the Gateway enforces participant status rules — blocking
    INACTIVE/SUSPENDED BAPs from sending requests, excluding INACTIVE/SUSPENDED
    BPPs from broadcast dispatch, and rejecting unregistered participants.

config:
  default_timeout: 30
  retry_on_failure: false

# ---------------------------------------------------------------------------
# Participants
# ---------------------------------------------------------------------------
participants:
  # bap_active — Active BAP used in WF-STA-02/03 for valid broadcast searches.
  - alias: "bap_active"
    subscriber_id_prefix: "bap-sta-active"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bap_inactive — BAP registered SUBSCRIBED then set INACTIVE. Used in WF-STA-01
  # to prove Gateway rejects INACTIVE BAPs before any BPP dispatch.
  - alias: "bap_inactive"
    subscriber_id_prefix: "bap-sta-inactive"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bap_suspended — BAP registered SUBSCRIBED then set SUSPENDED. Used in WF-STA-03
  # sender-block sub-test.
  - alias: "bap_suspended"
    subscriber_id_prefix: "bap-sta-suspended"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_active — Active SUBSCRIBED BPP; receives broadcast in WF-STA-02/03.
  - alias: "bpp_active"
    subscriber_id_prefix: "bpp-sta-active"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_inactive — BPP registered SUBSCRIBED then set INACTIVE. Used in WF-STA-02
  # to prove Gateway excludes INACTIVE BPPs from broadcast dispatch.
  - alias: "bpp_inactive"
    subscriber_id_prefix: "bpp-sta-inactive"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bpp_suspended — BPP registered SUBSCRIBED then set SUSPENDED. Used in WF-STA-03
  # receiver-exclusion sub-test.
  - alias: "bpp_suspended"
    subscriber_id_prefix: "bpp-sta-suspended"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"
    private_key_seed: "MC4CAQAwBQYDK2VwBCIEIPGt7Hv6vy2haK04ipiBbgU0omo/IGjs+hmuGE+jXkbf"

  # bap_unknown — A locally generated key pair whose subscriber_id is never
  # registered in the Registry. Used in WF-STA-04 to prove the Gateway rejects
  # unregistered participants. generate_unique_id: true ensures a fresh id each run.
  # No private_key_seed — the runner generates a fresh ephemeral Ed25519 key pair
  # each run so the signer is genuinely unknown to the Registry.
  - alias: "bap_unknown"
    subscriber_id_prefix: "bap-sta-unknown-never-registered"
    generate_unique_id: true
    domain: "ONDC:RET10"
    callback_uri: "https://seller-mock.kynondc.net"

tests:

  # ===========================================================================
  # WF-STA-01 · Inactive BAP Blocked
  #
  # Goal: A BAP with status=INACTIVE is rejected by the Gateway before any BPP
  #       dispatch. The BAP's key IS in the key store (auth parses), but status
  #       enforcement blocks the request.
  #
  # Core assertions:
  #   Step 3  PATCH bap_inactive → INACTIVE → 200 ACK (definitive proof)
  #   Step 5  Gateway rejects bap_inactive search → expected non-ACK response
  # ===========================================================================

  - id: "WF-STA-01"
    name: "Inactive BAP Blocked"
    description: >
      BAP-STA-INACTIVE is registered as SUBSCRIBED (key in key store) then set
      INACTIVE. Its subsequent search request to the Gateway must be rejected
      before any BPP dispatch occurs. The Gateway's status enforcement fires even
      though the ONDC-SIG header is cryptographically valid.
    workflow: true

    steps:

      # ── Step 1: Register bap_inactive as SUBSCRIBED ─────────────────────────
      - name: "Step 1 – Admin: Register BAP-STA-INACTIVE as SUBSCRIBED (key enters key store)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_inactive_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_inactive_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP STA Inactive Status Test"
            - cred_id: "cred-pan-{{bap_inactive_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP STA Inactive Status Test"
          contacts:
            - contact_id: "contact-auth-{{bap_inactive_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-sta-inactive.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_inactive_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-sta-inactive.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_inactive_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-sta-inactive.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_inactive_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_inactive_valid_from}}"
              valid_until: "{{bap_inactive_valid_until}}"
          location:
            - location_id: "loc-{{bap_inactive_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_inactive_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_inactive_uri}}"
          configs:
            - domain: "{{bap_inactive_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_inactive_id}}"
              location_id: "loc-{{bap_inactive_uk_id}}"
              uri_id: "uri-{{bap_inactive_uk_id}}"
              key_id: "{{bap_inactive_uk_id}}"
        expected_status: [200, 409]

      # ── Step 2: Register a SUBSCRIBED BPP (would receive dispatch if BAP were active)
      - name: "Step 2 – Admin: Register BPP-STA-ACTIVE as SUBSCRIBED (would receive dispatch)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_active_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_active_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP STA Active Dispatch Target"
            - cred_id: "cred-pan-{{bpp_active_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP STA Active Dispatch Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_active_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-sta-active.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_active_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-sta-active.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_active_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-sta-active.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_active_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_active_valid_from}}"
              valid_until: "{{bpp_active_valid_until}}"
          location:
            - location_id: "loc-{{bpp_active_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_active_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_active_uri}}"
          configs:
            - domain: "{{bpp_active_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_active_id}}"
              location_id: "loc-{{bpp_active_uk_id}}"
              uri_id: "uri-{{bpp_active_uk_id}}"
              key_id: "{{bpp_active_uk_id}}"
        expected_status: [200, 409]

      # ── Step 3: PATCH bap_inactive → INACTIVE (definitive proof) ────────────
      - name: "Step 3 – Admin: Set BAP-STA-INACTIVE to INACTIVE — 200 ACK = definitive proof"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "{{bap_inactive_id}}"
          action: "INACTIVE"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 4: Confirm bap_inactive record exists in Registry ───────────────
      - name: "Step 4 – Admin: Confirm BAP-STA-INACTIVE record exists (INACTIVE)"
        method: "GET"
        endpoint: "/admin/participants/{{bap_inactive_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            exists: true
        post_wait_seconds: 5

      # ── Step 4b: Registry v3 lookup — confirm bap_inactive hidden ───────────
      # POST /v3.0/lookup filtered by bap_inactive_id — same call the Gateway
      # makes internally when resolving a subscriber_id. NACK confirms the
      # INACTIVE participant is invisible from the same vantage point the
      # Gateway uses at runtime, providing a second independent proof beyond
      # the admin API.
      - name: "Step 4b – Registry: Lookup BAP-STA-INACTIVE via /v3.0/lookup — expect configs.status=INACTIVE"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bpp_active"
        use_base_url: true
        data:
          subscriber_id: "{{bap_inactive_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "INACTIVE"

      # ── Step 5: Gateway internal — status check fires ────────────────────────
      - name: "Step 5 – Gateway internal: Gateway resolves INACTIVE status; request rejected before BPP dispatch"
        method: "INTERNAL"

      # ── Step 6: INACTIVE BAP sends search — expect rejection ─────────────────
      # The ONDC-SIG header is cryptographically valid (key is in the key store).
      # The Gateway must reject based on status=INACTIVE, not on signature failure.
      # Expected: NACK or 4xx — any non-ACK response proves status enforcement.
      - name: "Step 6 – Gateway: INACTIVE BAP-STA-INACTIVE sends search — expect NACK or rejection"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_inactive"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_inactive_id}}"
            bap_uri: "{{bap_inactive_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 400, 401, 403]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            in_range:
              min: 10000
              max: 14999

      # ── Step 7: Validation — no BPP dispatched ───────────────────────────────
      - name: "Step 7 – Validation: No BPP dispatch occurred; Gateway rejected INACTIVE BAP before routing"
        method: "INTERNAL"
        validates:
          - step_contains: "INACTIVE BAP-STA-INACTIVE sends search"
            expect: "passed"
            expected_outcome: "Rejected (NACK)"
            fail_outcome: "Accepted (ACK)"


  # ===========================================================================
  # WF-STA-02 · Inactive BPP Hidden from Broadcast
  #
  # Goal: A broadcast search from a valid SUBSCRIBED BAP does not dispatch to
  #       INACTIVE BPPs. Only SUBSCRIBED BPPs appear in the Gateway's dispatch list.
  #
  # Core assertions:
  #   Step 5  PATCH bpp_inactive → INACTIVE → 200 ACK (exclusion proof)
  #   Step 7  bap_active broadcast search → 200/202 ACK
  #   Step 9  bpp_active sends on_search → 200/202 ACK (SUBSCRIBED BPP responds)
  #   Proof   bpp_inactive never appears in dispatch (absence confirmed by PATCH ACK)
  # ===========================================================================

  - id: "WF-STA-02"
    name: "Inactive BPP Hidden from Broadcast"
    description: >
      BAP-STA-ACTIVE (SUBSCRIBED) sends a broadcast search. BPP-STA-ACTIVE
      (SUBSCRIBED) receives dispatch and sends on_search. BPP-STA-INACTIVE is
      registered SUBSCRIBED then set INACTIVE (Step 5 PATCH 200 ACK = exclusion
      proof) before the broadcast — Gateway must exclude it from the dispatch list.
    workflow: true

    steps:

      # ── Step 1: Register bap_active as SUBSCRIBED ────────────────────────────
      - name: "Step 1 – Admin: Register BAP-STA-ACTIVE as SUBSCRIBED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_active_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_active_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP STA Active Broadcast Sender"
            - cred_id: "cred-pan-{{bap_active_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP STA Active Broadcast Sender"
          contacts:
            - contact_id: "contact-auth-{{bap_active_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-sta-active.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_active_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-sta-active.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_active_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-sta-active.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_active_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_active_valid_from}}"
              valid_until: "{{bap_active_valid_until}}"
          location:
            - location_id: "loc-{{bap_active_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_active_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_active_uri}}"
          configs:
            - domain: "{{bap_active_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_active_id}}"
              location_id: "loc-{{bap_active_uk_id}}"
              uri_id: "uri-{{bap_active_uk_id}}"
              key_id: "{{bap_active_uk_id}}"
        expected_status: [200, 409]

      # ── Step 2: Register bpp_active as SUBSCRIBED ────────────────────────────
      - name: "Step 2 – Admin: Register BPP-STA-ACTIVE as SUBSCRIBED (eligible for broadcast)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_active_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_active_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP STA Active Broadcast Target"
            - cred_id: "cred-pan-{{bpp_active_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP STA Active Broadcast Target"
          contacts:
            - contact_id: "contact-auth-{{bpp_active_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-sta-active.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_active_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-sta-active.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_active_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-sta-active.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_active_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_active_valid_from}}"
              valid_until: "{{bpp_active_valid_until}}"
          location:
            - location_id: "loc-{{bpp_active_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_active_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_active_uri}}"
          configs:
            - domain: "{{bpp_active_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_active_id}}"
              location_id: "loc-{{bpp_active_uk_id}}"
              uri_id: "uri-{{bpp_active_uk_id}}"
              key_id: "{{bpp_active_uk_id}}"
        expected_status: [200, 409]

      # ── Step 3: Register bpp_inactive as SUBSCRIBED (will be set INACTIVE) ───
      - name: "Step 3 – Admin: Register BPP-STA-INACTIVE as SUBSCRIBED (will be set INACTIVE)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_inactive_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_inactive_uk_id}}"
              type: "GST"
              cred_data:
