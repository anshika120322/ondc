            - contact_id: "contact-biz-{{bpp_inactive_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-sta-inactive.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_inactive_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-sta-inactive.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_inactive_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_inactive_valid_from}}"
              valid_until: "{{bpp_inactive_valid_until}}"
          location:
            - location_id: "loc-{{bpp_inactive_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_inactive_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_inactive_uri}}"
          configs:
            - domain: "{{bpp_inactive_domain}}"
              np_type: "BPP"
