  #
  # Goal: A SUSPENDED BAP is rejected from sending; a SUSPENDED BPP is excluded
  #       from broadcast dispatch. Tests both sender-block and receiver-exclusion.
  #
  # Core assertions:
  #   Step 3  PATCH bap_suspended → SUSPENDED → 200 ACK
  #   Step 4  PATCH bpp_suspended → SUSPENDED → 200 ACK
