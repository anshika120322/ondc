            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 10: bpp_active sends on_search ─────────────────────────────────
      - name: "Step 10 – Gateway: BPP-STA-ACTIVE sends on_search (SUBSCRIBED BPP responds normally) — expect ACK"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_active"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_active_id}}"
            bap_uri: "{{bap_active_uri}}"
            bpp_id: "{{bpp_active_id}}"
            bpp_uri: "{{bpp_active_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-STA-ACTIVE Store"
              providers:
                - id: "provider-sta-active"
                  descriptor:
                    name: "STA Active Provider"
                  items:
                    - id: "item-sta-active-001"
                      descriptor:
                        name: "Status Enforcement Test Item"
                      price:
                        currency: "INR"
                        value: "100.00"
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 11: Validation — receiver exclusion ─────────────────────────────
      - name: "Step 11 – Validation: bpp_suspended absent from broadcast; bpp_active responded normally"
        method: "INTERNAL"
        validates:
          - step_contains: "BAP-STA-ACTIVE sends broadcast search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-STA-ACTIVE sends on_search (SUBSCRIBED BPP responds normally)"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"


  # ===========================================================================
  # WF-STA-04 · Unregistered Participant Rejected
  #
  # Goal: A request using a subscriber_id not in the Registry is rejected before
  #       any BPP is contacted. The key pair is locally generated (fresh ephemeral
  #       Ed25519) — there is no Registry entry for this subscriber_id.
  #
  # Core assertions:
  #   Step 1  Admin GET confirms subscriber_id has no Registry record
  #   Step 2  Gateway search with bap_unknown → NACK rejection
  #   Step 3  Validation
  # ===========================================================================

  - id: "WF-STA-04"
    name: "Unregistered Participant Rejected"
    description: >
      BAP-STA-UNKNOWN-NEVER-REGISTERED is a locally generated participant whose
      subscriber_id does not exist in the Registry. Its search request to the
      Gateway must be rejected before any BPP dispatch — the Gateway cannot resolve
      the subscriber_id in the Registry and must return NACK or 4xx.
    workflow: true

    steps:

      # ── Step 1: Register bap_active as SUBSCRIBED — provides a valid signer ──
      # bap_active's key is pre-seeded (private_key_seed in participants) so it
      # can sign ONDC-SIG for the v3 lookup in Step 2.  This step is idempotent:
      # if bap_active already exists from a prior test in the same run, the 409
      # is accepted.
      - name: "Step 1 – Admin: Register BAP-STA-ACTIVE as SUBSCRIBED (provides valid signer for v3 lookup)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_active_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_active_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP STA Active Broadcast Sender"
            - cred_id: "cred-pan-{{bap_active_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP STA Active Broadcast Sender"
          contacts:
            - contact_id: "contact-auth-{{bap_active_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-sta-active.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_active_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-sta-active.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_active_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-sta-active.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_active_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_active_valid_from}}"
              valid_until: "{{bap_active_valid_until}}"
          location:
            - location_id: "loc-{{bap_active_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_active_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_active_uri}}"
          configs:
            - domain: "{{bap_active_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_active_id}}"
              location_id: "loc-{{bap_active_uk_id}}"
              uri_id: "uri-{{bap_active_uk_id}}"
              key_id: "{{bap_active_uk_id}}"
        expected_status: [200, 409]
        post_wait_seconds: 5

      # ── Step 2: Registry v3 lookup — confirm bap_unknown is absent ───────────
      # POST /v3.0/lookup filtered by bap_unknown_id — mirrors exactly the call
      # the Gateway makes when it resolves a subscriber_id from the Authorization
      # keyId. A NACK response (error code 1001) proves the subscriber_id has no
      # Registry entry.
      #
      # Signer: bap_active (registered in Step 1).
      # NOTE — Revised ONDC spec (April 2026): /v3.0/lookup is accessible to ANY
      # registered participant with a valid signature, regardless of their status
      # (INACTIVE, SUSPENDED, UNSUBSCRIBED etc.). SUBSCRIBED is therefore NOT a
      # requirement for the lookup signer; bap_active is used here simply because
      # it has a known stable key registered in the Registry key store, ensuring
      # a reliable ONDC-SIG for the lookup call.
      #
      # Expected outcome:
      #   HTTP 200, body = {"message": {"ack": {"status": "NACK"}},
      #                     "error":   {"code": "15000–19999", ...}}
      #   → subscriber_id confirmed absent in Registry
      - name: "Step 2 – Registry: Lookup BAP-STA-UNKNOWN subscriber_id — expect NACK (not registered)"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_active"
        use_base_url: true
        data:
          subscriber_id: "{{bap_unknown_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15
          interval_seconds: 1
        validate:
          - field: "message.ack.status"
            value: "NACK"
          - field: "error.code"
            in_range:
              min: 15000
              max: 19999

      # ── Step 3: Unregistered participant sends search — expect rejection ──────
      # bap_unknown's ONDC-SIG is signed with a fresh ephemeral Ed25519 key that
      # was never registered. The subscriber_id in the keyId has no Registry entry.
      # Gateway must reject with NACK (4xx) — no BPP dispatched.
      - name: "Step 3 – Gateway: Unregistered BAP-STA-UNKNOWN sends search — expect rejection"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_unknown"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_unknown_id}}"
            bap_uri: "{{bap_unknown_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [400, 401, 403, 404]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "NACK"

      # ── Step 4: Gateway internal — Registry lookup context (documentation) ───
      - name: "Step 4 – Gateway internal: Gateway attempted Registry lookup for unknown subscriber_id — not found; request rejected"
        method: "INTERNAL"

      # ── Step 5: Validation ───────────────────────────────────────────────────
      - name: "Step 5 – Validation: Unknown participant rejected; no BPP dispatched"
        method: "INTERNAL"
        validates:
          - step_contains: "Unregistered BAP-STA-UNKNOWN sends search"
            expect: "passed"
            expected_outcome: "Rejected (NACK)"
            fail_outcome: "Accepted (ACK)"
