    name: "Valid Transaction Flow (select → init → confirm)"
    description: >
      BAP-TXN-001 (bap_txn, SUBSCRIBED) executes a two-phase transaction via the
      Gateway to BPP-TXN-001 (bpp_txn, SUBSCRIBED). Phase 1 (Discovery): search
      and on_search use {{transaction_id}}. Phase 2 (Order): select, on_select,
      init, on_init, confirm, and on_confirm use a separate {{order_transaction_id}}.
      Gateway validates ONDC-SIG on each call and returns 200/202 ACK.
