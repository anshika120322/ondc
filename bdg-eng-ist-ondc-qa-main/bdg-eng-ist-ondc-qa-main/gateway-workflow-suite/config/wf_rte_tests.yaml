      # bpp_dr_other IS eligible for broadcast in this domain/city but must NOT
      # receive dispatch from the direct-route search in Step 7.
      - name: "Step 6 – Admin: Confirm BPP-DR-OTHER is SUBSCRIBED (eligible for broadcast; must not be dispatched)"
        method: "GET"
