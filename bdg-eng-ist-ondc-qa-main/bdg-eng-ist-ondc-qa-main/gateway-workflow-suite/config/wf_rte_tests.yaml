              providers:
                - id: "provider-dr-target"
                  descriptor:
                    name: "DR Target Provider"
                  items:
                    - id: "item-dr-target-001"
                      descriptor:
                        name: "Direct Route Test Item"
                      price:
                        currency: "INR"
                        value: "500.00"
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 10: Gateway internal — forward on_search to BAP callback URI ─────
      # Gateway forwards bpp_dr_target's on_search to bap_dr's registered callback
      # URI. Only one on_search is delivered — from bpp_dr_target. bpp_dr_other
      # was never dispatched so its on_search is absent from the callback traffic.
      - name: "Step 9 – Gateway internal: Forward on_search from BPP-DR-TARGET to BAP-DR-001 callback URI"
        method: "INTERNAL"

      # ── Step 11: Validation — only BPP-DR-TARGET's on_search received ────────
      # BAP callback (bap_dr_uri) should have received exactly one on_search,
      # from bpp_dr_target only. bpp_dr_other must be absent.
      # Requires a queryable BAP mock endpoint — skipped if unavailable.
      - name: "Step 10 – Validation: BAP callback received on_search from BPP-DR-TARGET only; BPP-DR-OTHER absent"
        method: "INTERNAL"
        validates:
          - step_contains: "BAP-DR-001 sends direct-route search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-DR-TARGET sends on_search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"


  # ===========================================================================
  # WF-RTE-03 · Valid Transaction Flow (select → init → confirm)
  #
  # Goal: BAP executes a two-phase transaction through the Gateway:
  #       Phase 1 — Discovery : search / on_search using {{transaction_id}}
  #       Phase 2 — Order     : select→init→confirm (+ callbacks) using
  #                             {{order_transaction_id}} (a DIFFERENT UUID)
  #       Both phases route to/from the same BPP. The Gateway must accept all
  #       eight messages and forward each on_action to the BAP callback URI.
  #
  # ── Transaction ID model ────────────────────────────────────────────────────
  #   search / on_search           → context.transaction_id = {{transaction_id}}
  #   select / on_select           → context.transaction_id = {{order_transaction_id}}
  #   init   / on_init             → context.transaction_id = {{order_transaction_id}}
  #   confirm / on_confirm         → context.transaction_id = {{order_transaction_id}}
  #
  #   Both {{transaction_id}} and {{order_transaction_id}} are fresh UUIDs
  #   generated once per test invocation by _build_gateway_context().
  #
  # ── Source document steps (Section 1, WF-RTE-03) ───────────────────────────
  #   1  Confirm BAP + BPP are SUBSCRIBED (admin GET)
  #   2  POST /gateway/action  action=search     bap_txn → Gateway → bpp_txn
  #   3  POST /gateway/on_action action=on_search  bpp_txn → Gateway → bap callback
  #   4  POST /gateway/action  action=select     bap_txn → Gateway → bpp_txn
  #   5  POST /gateway/on_action action=on_select  bpp_txn → Gateway → bap callback
  #   6  POST /gateway/action  action=init       bap_txn → Gateway → bpp_txn
  #   7  POST /gateway/on_action action=on_init    bpp_txn → Gateway → bap callback
  #   8  POST /gateway/action  action=confirm    bap_txn → Gateway → bpp_txn
  #   9  POST /gateway/on_action action=on_confirm bpp_txn → Gateway → bap callback
  #   10 (validation) search uses {{transaction_id}}; order leg uses {{order_transaction_id}}
  #
  # ── Core assertions ─────────────────────────────────────────────────────────
  #   Steps 5,6,8,9,11,12,14,15: 200/202 ACK from Gateway
  #   search/on_search share {{transaction_id}}
  #   select/on_select/init/on_init/confirm/on_confirm share {{order_transaction_id}}
  #   Gateway-internal forward steps shown as INTERNAL accordion entries
  # ===========================================================================

