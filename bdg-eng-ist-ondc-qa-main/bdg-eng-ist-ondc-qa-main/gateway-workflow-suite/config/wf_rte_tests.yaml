      # ── Step 5: Confirm BPP-DR-TARGET is SUBSCRIBED — note subscriber_id ─────
      # The response includes participant_id which is bpp_dr_target's subscriber_id.
      # This is the value placed as bpp_id in the search context (Step 7).
      - name: "Step 5 – Admin: Confirm BPP-DR-TARGET is SUBSCRIBED (record subscriber_id for direct route)"
        method: "GET"
