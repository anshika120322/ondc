      # bap_dr sends search with bpp_id=bpp_dr_target's subscriber_id in context.
      # The Gateway must validate bap_dr's ONDC-SIG and route exclusively to
      # bpp_dr_target. bpp_dr_other (SUBSCRIBED, same domain) must NOT receive
      # any dispatch — the presence of bpp_id enforces single-BPP routing.
      # Expected: 200/202 ACK — Gateway accepted the direct-route search.
      - name: "Step 7 – Gateway: BAP-DR-001 sends direct-route search (bpp_id=bpp_dr_target) — expect ACK"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_dr"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_dr_id}}"
            bap_uri: "{{bap_dr_uri}}"
            bpp_id: "{{bpp_dr_target_id}}"
            bpp_uri: "{{bpp_dr_target_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 8: Gateway internal — route exclusively to BPP-DR-TARGET ─────────
      # Gateway reads bpp_id from the search context and dispatches ONLY to
      # bpp_dr_target. bpp_dr_other is not in the dispatch list for this request.
      - name: "Gateway internal: Route exclusively to BPP-DR-TARGET; BPP-DR-OTHER not dispatched"
        skip: true

      # ── Step 9: BPP-DR-TARGET sends on_search to Gateway ─────────────────────
      # The targeted BPP receives the search and sends its catalog response back
      # to the Gateway via /on_search. The Gateway verifies bpp_dr_target's
      # ONDC-SIG against its registered key in the key store.
      # Expected: 200/202 ACK — Gateway accepted the on_search from the target BPP.
      - name: "Step 8 – Gateway: BPP-DR-TARGET sends on_search (catalog response) — expect ACK"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
