      # This BPP is SUBSCRIBED in the same domain and city as bpp_dr_target.
      # It would normally receive a broadcast search, but because the search in
      # Step 7 includes bpp_id=bpp_dr_target, this BPP must NOT receive any dispatch.
      # Exclusion proof: this BPP never sends on_search during WF-RTE-02 steps.
      - name: "Step 3 – Admin: Register BPP-DR-OTHER as SUBSCRIBED (same domain; must NOT be dispatched)"
