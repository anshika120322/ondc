  # ===========================================================================
  # WF-RTE-04 · Callback URL Routing
  #
  # Goal: When a BPP sends an on_search to the Gateway, the Gateway reads bap_id
  #       from the context, resolves the BAP's registered callback URI from the
  #       Registry, and forwards the payload exclusively to that URI.
  #
  # ── Source document steps (Section 1, WF-RTE-04) ───────────────────────────
  #   1  GET /admin/participants/{id}  Confirm BAP callback URI registered
  #   2  POST /gateway/action (search) BAP sends search; Gateway dispatches to BPP
  #   3  POST /gateway/on_action (on_search, bap_id=BAP)  BPP responds
  #   4  (Gateway internal)  Gateway reads bap_id; resolves callback URI; verifies BPP sig
  #   5  (Gateway internal)  Gateway forwards on_search to BAP's registered callback URI
  #   6  (validation)        on_search delivered to BAP's callback URI only
  #
  # ── Core assertions ─────────────────────────────────────────────────────────
  #   Step 3  Admin GET confirming bap_cb's callback URI is in the Registry
  #   Step 6  Gateway: bap_cb sends search → 200/202 ACK
  #   Step 8  Gateway: bpp_cb sends on_search (bap_id=bap_cb) → 200/202 ACK
  #   Steps 9-10  INTERNAL: Gateway resolves + forwards to bap_cb's callback URI
  # ===========================================================================

  - id: "WF-RTE-04"
    name: "Callback URL Routing"
    description: >
      BAP-CB-001 (bap_cb, SUBSCRIBED) is registered with a CALLBACK uri.
      It sends a direct-route search to BPP-CB-001 (bpp_cb, SUBSCRIBED).
      BPP-CB-001 sends on_search back to the Gateway with bap_id=bap_cb in context.
      The Gateway reads bap_id, resolves bap_cb's registered callback URI from the
      Registry, and forwards on_search exclusively to that URI.
      All participants generated fresh per run; dns_skip bypasses GST/DNS in preprod.
    workflow: true

    steps:

      # ── Step 1: Register BAP-CB-001 as SUBSCRIBED (with CALLBACK uri) ───────
      # The CALLBACK uri block is the key part of this test: the Gateway must
      # resolve this URI from the Registry using bap_id in the on_search context.
      - name: "Step 1 – Admin: Register BAP-CB-001 as SUBSCRIBED (with registered CALLBACK uri)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bap_cb_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bap_cb_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BAP CB Callback URL Routing BAP"
            - cred_id: "cred-pan-{{bap_cb_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BAP CB Callback URL Routing BAP"
          contacts:
            - contact_id: "contact-auth-{{bap_cb_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bap-cb.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bap_cb_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bap-cb.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bap_cb_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bap-cb.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bap_cb_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bap_cb_valid_from}}"
              valid_until: "{{bap_cb_valid_until}}"
          location:
            - location_id: "loc-{{bap_cb_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bap_cb_uk_id}}"
              type: "CALLBACK"
              url: "{{bap_cb_uri}}"
          configs:
            - domain: "{{bap_cb_domain}}"
              np_type: "BAP"
              subscriber_id: "{{bap_cb_id}}"
              location_id: "loc-{{bap_cb_uk_id}}"
              uri_id: "uri-{{bap_cb_uk_id}}"
              key_id: "{{bap_cb_uk_id}}"
        expected_status: [200, 409]

      # ── Step 2: Register BPP-CB-001 as SUBSCRIBED ──────────────────────────
      - name: "Step 2 – Admin: Register BPP-CB-001 as SUBSCRIBED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{bpp_cb_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred-gst-{{bpp_cb_uk_id}}"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "BPP CB Callback URL Routing BPP"
            - cred_id: "cred-pan-{{bpp_cb_uk_id}}"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
                name: "BPP CB Callback URL Routing BPP"
          contacts:
            - contact_id: "contact-auth-{{bpp_cb_uk_id}}"
              type: "AUTHORISED_SIGNATORY"
              name: "Auth Rep"
              email: "auth@bpp-cb.example.com"
              phone: "+919876543210"
            - contact_id: "contact-biz-{{bpp_cb_uk_id}}"
              type: "BUSINESS"
              name: "Biz Rep"
              email: "biz@bpp-cb.example.com"
              phone: "+919876543211"
            - contact_id: "contact-tech-{{bpp_cb_uk_id}}"
              type: "TECHNICAL"
              name: "Tech Rep"
              email: "tech@bpp-cb.example.com"
              phone: "+919876543212"
          key:
            - uk_id: "{{bpp_cb_uk_id}}"
              signing_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              encryption_public_key: "MCowBQYDK2VwAyEAVXtuKQMPh485BxBcV1jbqNHRuuyyJnbe1QIQoQYjLBg="
              signed_algorithm: "ED25519"
              encryption_algorithm: "X25519"
              valid_from: "{{bpp_cb_valid_from}}"
              valid_until: "{{bpp_cb_valid_until}}"
          location:
            - location_id: "loc-{{bpp_cb_uk_id}}"
              type: "SERVICEABLE"
              country: "IND"
              city:
                - "std:080"
          uri:
            - uri_id: "uri-{{bpp_cb_uk_id}}"
              type: "CALLBACK"
              url: "{{bpp_cb_uri}}"
          configs:
            - domain: "{{bpp_cb_domain}}"
              np_type: "BPP"
              subscriber_id: "{{bpp_cb_id}}"
              location_id: "loc-{{bpp_cb_uk_id}}"
              uri_id: "uri-{{bpp_cb_uk_id}}"
              key_id: "{{bpp_cb_uk_id}}"
        expected_status: [200, 409]

      # ── Step 3: Confirm BAP-CB-001 is SUBSCRIBED and callback URI is registered ─
      # The Registry GET response includes the participant's uri block.
      # This confirms the CALLBACK uri is present and the Gateway can resolve it.
      - name: "Step 3 – Admin: Confirm BAP-CB-001 is SUBSCRIBED with CALLBACK uri registered"
        method: "GET"
        endpoint: "/admin/participants/{{bap_cb_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            exists: true
        post_wait_seconds: 5

      # ── Step 3b: Registry v3 lookup — confirm bap_cb SUBSCRIBED ──────────────
      - name: "Step 3b – Registry: Lookup BAP-CB-001 via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bpp_cb"
        use_base_url: true
        data:
          subscriber_id: "{{bap_cb_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BAP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15  # UAT observed: ~3s propagation lag for bpp_cb
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Step 4: Confirm BPP-CB-001 is SUBSCRIBED ──────────────────────────
      - name: "Step 4 – Admin: Confirm BPP-CB-001 is SUBSCRIBED"
        method: "GET"
        endpoint: "/admin/participants/{{bpp_cb_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: "participant_id"
            exists: true
        post_wait_seconds: 5

      # ── Step 4b: Registry v3 lookup — confirm bpp_cb SUBSCRIBED ──────────────
      - name: "Step 4b – Registry: Lookup BPP-CB-001 via /v3.0/lookup — expect configs.status=SUBSCRIBED"
        method: "POST"
        endpoint: "/v3.0/lookup"
        auth_type: "v3"
        auth_subscriber_id: "bap_cb"
        use_base_url: true
        data:
          subscriber_id: "{{bpp_cb_id}}"
          country: "IND"
          domain: "ONDC:RET10"
          type: "BPP"
        expected_status: [200]
        continue_on_failure: true
        retry:
          timeout_seconds: 15  # UAT observed: ~1s propagation lag for bap_cb
          interval_seconds: 1
        validate:
          - field: "0.configs.0.status"
            value: "SUBSCRIBED"

      # ── Step 5: Gateway internal — verify BAP callback URI resolved from Registry ─
      # Documents the Gateway's Registry lookup that will be triggered when
      # bpp_cb's on_search arrives with bap_id=bap_cb in context.
      - name: "Step 5 – Gateway internal: Registry resolves BAP-CB-001 callback URI via bap_id lookup"
        method: "INTERNAL"

      # ── Step 6: BAP sends search (direct-route to bpp_cb) ─────────────────
      # bap_cb sends a direct-route search. Gateway validates ONDC-SIG + status
      # and dispatches to bpp_cb. ACK confirms Gateway accepted the search.
      - name: "Step 6 – Gateway: BAP-CB-001 sends search (bpp_id=bpp_cb) — expect ACK"
        method: "POST"
        action: "search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bap_cb"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_cb_id}}"
            bap_uri: "{{bap_cb_uri}}"
            bpp_id: "{{bpp_cb_id}}"
            bpp_uri: "{{bpp_cb_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            intent: {}
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 7: Gateway internal — dispatch search to bpp_cb ────────────────
      - name: "Step 7 – Gateway internal: Dispatch search to BPP-CB-001"
        method: "INTERNAL"

      # ── Step 8: BPP-CB-001 sends on_search (bap_id=bap_cb in context) ────────
      # bap_id in context is bap_cb's subscriber_id. The Gateway reads this,
      # performs a Registry lookup, gets bap_cb's CALLBACK uri, and forwards
      # the on_search exclusively to that URI.
      # ACK confirms Gateway accepted the on_search from bpp_cb.
      - name: "Step 8 – Gateway: BPP-CB-001 sends on_search (bap_id=bap_cb in context) — expect ACK"
        method: "POST"
        action: "on_search"
        endpoint: "/{{action}}"
        auth_type: "v3"
        auth_subscriber_id: "bpp_cb"
        data:
          context:
            domain: "ONDC:RET10"
            action: "{{action}}"
            version: "2.0.0"
            bap_id: "{{bap_cb_id}}"
            bap_uri: "{{bap_cb_uri}}"
            bpp_id: "{{bpp_cb_id}}"
            bpp_uri: "{{bpp_cb_uri}}"
            transaction_id: "{{transaction_id}}"
            message_id: "{{message_id}}"
            location:
              city:
                code: "std:080"
              country:
                code: "IND"
            ttl: "PT30S"
            timestamp: "{{timestamp}}"
          message:
            catalog:
              descriptor:
                name: "BPP-CB-001 Store"
              providers:
                - id: "provider-cb-001"
                  descriptor:
                    name: "CB Provider"
                  items:
                    - id: "item-cb-001"
                      descriptor:
                        name: "Callback Routing Test Item"
                      price:
                        currency: "INR"
                        value: "150.00"
        expected_status: [200, 202]
        continue_on_failure: true
        validate:
          - field: "message.ack.status"
            value: "ACK"

      # ── Step 9: Gateway internal — resolve + forward to BAP callback URI ──────
      # Gateway reads bap_id from on_search context, looks up bap_cb's callback
      # URI in the Registry, and forwards the on_search payload there.
      - name: "Step 9 – Gateway internal: Resolve BAP-CB-001 callback URI via bap_id; forward on_search"
        method: "INTERNAL"

      # ── Step 10: Validation — on_search delivered to BAP-CB-001 callback URI only ─
      # BAP-CB-001's registered callback URI should have received exactly one
      # on_search from bpp_cb via the Gateway. No other endpoint receives it.
      # Requires a queryable BAP mock endpoint — documented as INTERNAL.
      - name: "Step 10 – Validation: on_search delivered exclusively to BAP-CB-001 registered callback URI"
        method: "INTERNAL"
        validates:
          - step_contains: "BAP-CB-001 sends search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
          - step_contains: "BPP-CB-001 sends on_search"
            expect: "passed"
            expected_outcome: "Accepted (ACK)"
            fail_outcome: "Rejected / No response"
