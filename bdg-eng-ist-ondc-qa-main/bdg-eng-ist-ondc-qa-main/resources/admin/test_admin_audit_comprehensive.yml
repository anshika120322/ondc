test_suite:
  name: Admin Audit Log Comprehensive Tests
  category: admin_audit
  total_tests: 12
  description: Complete audit logging tests covering entry creation, filtering, and entity-specific record types

config:
  auth_type: admin
  default_timeout: 30
  base_url: https://registry-uat.kynondc.net
  audit_endpoint: /admin/audit/logs

  # Admin authentication
  admin_token_env: ADMIN_BEARER_TOKEN
  
  # Audit log field expectations
  expected_audit_fields:
    - action_kind
    - record_type
    - performed_by
    - existing_record
    - request_record
    - performed_at

  # Record types to test
  record_types:
    - PARTICIPANT
    - KEY
    - CONTACT
    - CREDENTIAL
    - URI
    - LOCATION
    - NETWORK_PARTICIPANT

  # Action kinds
  action_kinds:
    - CREATE
    - UPDATE
    - UPDATE_STATUS
    - DELETE

tests:
  # ==========================================
  # AUDIT ENTRY CREATION TESTS
  # ==========================================
  
  - id: AUDIT-01
    name: "Subscribe operation creates audit log entry"
    description: "Verify POST /admin/subscribe creates audit entry with action_kind=CREATE and record_type=PARTICIPANT"
    steps:
      - name: "Step 1: Create participant via admin subscribe"
        type: api
        method: POST
        endpoint: /admin/subscribe
        auth_type: admin
        data:
          participant_id: "audit-test-subscribe-{{timestamp}}.participant.ondc"
          action: WHITELISTED
          credentials:
            - cred_id: cred_gst_audit_01
              type: GST
              cred_data:
                gstin: 29AUDIT01234F1Z5
                legal_name: Audit Test Company Ltd
          contacts:
            - contact_id: contact_audit_01
              type: AUTHORISED_SIGNATORY
              name: Audit Test Contact
              email: audit@test.ondc.org
              phone: "+919876543210"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: ED25519
            encryption_algorithm: X25519
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: loc_audit_01
            type: SERVICEABLE
            country: IND
            city:
              - "std:080"
          uri:
            uri_id: uri_audit_01
            type: CALLBACK
            url: "https://audit-test-subscribe-{{timestamp}}.participant.ondc/callback"
          configs:
            - domain: ONDC:RET10
              np_type: BPP
              subscriber_id: "audit-test-subscribe-{{timestamp}}.participant.ondc"
              location_id: loc_audit_01
              uri_id: uri_audit_01
              key_id: "{{uk_id}}"
          dns_skip: true
          skip_ssl_verification: true
        expected_status: [200, 201]
        store_response:
          participant_id: "audit-test-subscribe-{{timestamp}}.participant.ondc"
      
      - name: "Step 2: Query audit logs for the subscribe operation"
        type: api
        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          record_type: PARTICIPANT
          limit: 50
        expected_status: 200
        validate:
          - type: audit_entry_exists
            action_kind: CREATE
            record_type: PARTICIPANT
            contains_participant_id: "audit-test-subscribe-{{timestamp}}.participant.ondc"
          - type: field_exists
            fields:
              - action_kind
              - record_type
              - performed_by
              - performed_at

  - id: AUDIT-02
    name: "Admin status change creates audit entry"
    description: "Verify admin PATCH with action=INACTIVE creates audit entry with action_kind=UPDATE_STATUS"
    steps:
      - name: "Step 1: Create participant"
        type: api
