          action: WHITELISTED
          credentials:
            - cred_id: cred_gst_audit_04
              type: GST
              cred_data:
                gstin: 29AUDIT04234F1Z5
                legal_name: Time Range Test Co
          contacts:
            - contact_id: contact_audit_04
              type: AUTHORISED_SIGNATORY
              name: Time Test Contact
              email: timetest@test.ondc.org
              phone: "+919876543213"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: ED25519
            encryption_algorithm: X25519
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: loc_audit_04
            type: SERVICEABLE
            country: IND
            city: ["std:080"]
          uri:
            uri_id: uri_audit_04
            type: CALLBACK
            url: "https://audit-test-timerange-{{timestamp}}.participant.ondc/callback"
          configs:
            - domain: ONDC:RET10
              np_type: BPP
              subscriber_id: "audit-test-timerange-{{timestamp}}.participant.ondc"
              location_id: loc_audit_04
              uri_id: uri_audit_04
              key_id: "{{uk_id}}"
          dns_skip: true
          skip_ssl_verification: true
        expected_status: [200, 201]
        store_timestamp: operation_time
      
      - name: "Step 2: Query audit logs with time range"
        type: api
        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          start_time: "{{start_time_minus_5min}}"
          end_time: "{{end_time_plus_5min}}"
          record_type: PARTICIPANT
          limit: 100
        expected_status: 200
        validate:
          - type: entries_within_time_range
            start_time: "{{start_time_minus_5min}}"
            end_time: "{{end_time_plus_5min}}"
          - type: chronological_order
            field: performed_at

  - id: AUDIT-05
    name: "Query audit log with multiple filters"
    description: "Verify audit logs support multiple filter combinations (record_type + action_kind + time)"
    steps:
      - name: "Step 1: Query with combined filters"
        type: api
        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          record_type: PARTICIPANT
          action_kind: CREATE
          limit: 50
        expected_status: 200
        validate:
          - type: all_records_match_filters
            record_type: PARTICIPANT
            action_kind: CREATE

