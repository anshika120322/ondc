  - id: AUDIT-11
    name: "Failed operations generate audit entries"
    description: "Verify failed API calls (400/403/404) also create audit log entries"
    steps:
      - name: "Step 1: Attempt invalid participant creation (missing required fields)"
        type: api
        method: POST
        endpoint: /admin/subscribe
        auth_type: admin
        data:
          participant_id: "audit-test-failed-{{timestamp}}.participant.ondc"
          action: WHITELISTED
          # Missing required key and configs - should fail
          dns_skip: true
          skip_ssl_verification: true
        expected_status: [400, 422]
      
      - name: "Step 2: Query audit logs for failed operation"
        type: api
        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          limit: 50
        expected_status: 200
        validate:
          - type: may_contain_failed_operation
            contains_participant_id: "audit-test-failed-{{timestamp}}.participant.ondc"
            expected_error_code: [400, 422]

