                  name: Chrono Business 2
                  email: biz2@chrono-test.ondc.org
                  phone: "+919876543224"
              key:
                uk_id: "{{uk_id_2}}"
                signing_public_key: "{{signing_public_key_2}}"
                encryption_public_key: "{{encryption_public_key_2}}"
                signed_algorithm: ED25519
