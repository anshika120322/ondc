        endpoint: /admin/subscribe
        auth_type: admin
        data:
          participant_id: "audit-test-status-{{timestamp}}.participant.ondc"
          action: SUBSCRIBED
          credentials:
            - cred_id: cred_gst_audit_02
              type: GST
              cred_data:
                gstin: 29AUDIT02234F1Z5
                legal_name: Status Test Company
            - cred_id: cred_pan_audit_02
              type: PAN
              cred_data:
                pan: AUDIT1234F
                name: Status Test Company
          contacts:
            - contact_id: contact_auth_audit_02
              type: AUTHORISED_SIGNATORY
              name: Status Test Contact
              email: status@test.ondc.org
              phone: "+919876543211"
            - contact_id: contact_biz_audit_02
              type: BUSINESS
              name: Status Business Contact
              email: business@status-test.ondc.org
              phone: "+919876543212"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: ED25519
            encryption_algorithm: X25519
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: loc_audit_02
            type: SERVICEABLE
            country: IND
            city: ["std:080"]
          uri:
            uri_id: uri_audit_02
            type: CALLBACK
            url: "https://audit-test-status-{{timestamp}}.participant.ondc/callback"
          configs:
            - domain: ONDC:RET10
              np_type: BPP
              subscriber_id: "audit-test-status-{{timestamp}}.participant.ondc"
              location_id: loc_audit_02
              uri_id: uri_audit_02
              key_id: "{{uk_id}}"
          dns_skip: true
          skip_ssl_verification: true
        expected_status: [200, 201]
      
      - name: "Step 2: Change participant status to INACTIVE"
        type: api
        method: PATCH
        endpoint: /admin/subscribe
        auth_type: admin
        data:
          participant_id: "audit-test-status-{{timestamp}}.participant.ondc"
          action: INACTIVE
          dns_skip: true
          skip_ssl_verification: true
        expected_status: 200
      
      - name: "Step 3: Query audit logs for status change"
        type: api
        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          action_kind: UPDATE_STATUS
          limit: 50
        expected_status: 200
        validate:
          - type: audit_entry_exists
            action_kind: UPDATE_STATUS
            record_type: PARTICIPANT
            contains_participant_id: "audit-test-status-{{timestamp}}.participant.ondc"
          - type: audit_fields_present
            fields:
              - performed_by
              - existing_record
              - request_record
              - performed_at

  # ==========================================
  # AUDIT QUERY FILTER TESTS
  # ==========================================
  
  - id: AUDIT-03
    name: "Query audit log with record_type filter"
    description: "Verify GET /admin/audit/logs?record_type=PARTICIPANT returns only participant records"
    steps:
      - name: "Step 1: Query audit logs filtered by record_type=PARTICIPANT"
