        method: GET
        endpoint: /admin/audit/logs
        auth_type: admin
        params:
          record_type: PARTICIPANT
          limit: 50
        expected_status: 200
        validate:
          - type: all_records_match_type
            record_type: PARTICIPANT
          - type: response_structure
            has_pagination: true
            has_data_array: true

  - id: AUDIT-04
    name: "Query audit log with time range filter"
    description: "Verify audit logs can be filtered by start_time and end_time"
    steps:
