test:
  # Performance thresholds (in milliseconds)
  performance:
    large_resultset_threshold: 2000
    small_resultset_threshold: 1000
    any_query_threshold: 1500
  
  # Data quality checks
  quality:
    allow_duplicates: false
    require_all_fields: true
    validate_urls: true

