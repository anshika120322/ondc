# V1 Lookup Filter Combinations Test Configuration
# V1 is the simplest lookup - only country and type parameters (no domain/city filters)

# QA Environment Configuration
ondcRegistryV1Lookup:
  # Base URL for Registry API (UAT Lookup Server)
  host: "https://registry-uat.kynondc.net"
  
  # Admin API Authentication (for participant registration)
  admin_username: "admin@ondc.org"
  admin_password: "Admin@123"
  admin_auth_url: "https://admin-auth-uat.kynondc.net/api/auth/login"
  
  # V2/V3 API ED25519 Signature Authentication (for registration)
  participant_id: "test-v3-lookup-working.participant.ondc"
  uk_id: "83b68b94-8fb9-44ad-bcd4-b0e89d741290"
  private_key_seed: "c190934de2c9aea71b47a31bacb8f002b0e4995c083cb457c0d58b9d6ba3670f"
  
  # ED25519 Public Keys (base64 encoded)
  signing_public_key: "rb07mNxVAG9quf/6CJCpNM06FwdG0N/FBn+qcLHvWxs="
  encryption_public_key: "MOsaXHtJWbQ6Y8W2mAYEHBrYMG/OYl/+y8yCMGQRExw="
  
  # V1 Default Lookup Payload
  # V1 only supports country and type (no domain/city filters like V2/V3)
  default_lookup_payload:
    country: "IND"
    type: "BPP"
  
  # Lookup Type Variations for V1
  # These are the only types supported by ONDC Registry
  lookup_types:
    - "BPP"
    - "BAP"
    - "BG"
    - "REGISTRY"
  
  # Countries (V1 only supports IND currently)
  countries:
    - "IND"

