  name: Runtime Refresh - Policy change from ALLOW to BLOCK
  description: 'Test policy update via PUT endpoint - runtime policy refresh'
  capture_payload: true
  measure_time: true
  steps:
  - name: 'Step 1: Create policy with ALLOW'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_runtime_test_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Runtime Test ALLOW {{timestamp}}
      description: Initial policy allowing traffic
      is_active: true
      priority: 100
      rule_definition:
        default_action: BLOCK
        rules:
        - id: RUNTIME-TEST-ALLOW
          description: Initially allow
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET14
            action: search
          action_to_take:
            action_type: BROADCAST
    save_response:
      runtime_policy_id: policy_id
    record_timestamp: policy_created_at
  - name: 'Step 2: Wait for policy propagation'
    wait: 2000
    note: Allow policy to propagate to gateway
  - name: 'Step 3: Verify policy is active via lookup'
    method: POST
    endpoint: /lookup
    expected_status: 200
    data:
      country: IND
      type: BG
    validate:
    - field: '[0].policies'
      condition: exists
    note: Confirm policy is visible in lookup
  - name: 'Step 4: Update policy to BLOCK'
    method: PUT
    endpoint: /admin/policies/{{runtime_policy_id}}
    auth_type: admin
    expected_status:
    - 200
    - 404
    data:
      rule_definition:
        default_action: BLOCK
        rules:
        - id: RUNTIME-TEST-BLOCK
          description: Changed to block
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET14
            action: search
          action_to_take:
            action_type: BLOCK
    record_timestamp: policy_updated_at
    note: Policy changed from BROADCAST to BLOCK
  - name: 'Step 5: Wait and verify policy change reflected'
    wait: 2000
    note: Policy change should reflect within milliseconds to 1 minute
  - name: 'Step 6: Verify updated policy via lookup'
    method: POST
    endpoint: /lookup
    auth_type: admin
    expected_status: 200
    data:
      country: IND
      type: BG
    validate:
    - field: rule_definition.rules[0].action_to_take.action_type
      condition: equals
      value: BLOCK
    calculate_time_diff: policy_updated_at
    note: Verify change took effect (should be < 60 seconds)
