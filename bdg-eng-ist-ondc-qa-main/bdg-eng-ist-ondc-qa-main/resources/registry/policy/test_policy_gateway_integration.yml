      buyer_subscriber_id: configs[0].subscriber_id
  - name: 'Step 3: Register Seller participant'
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    expected_status:
    - 200
    - 201
    - 409
    data:
      participant_id: seller_3layer_{{timestamp}}
      action: SUBSCRIBED
      dns_skip: true
      skip_ssl_verification: true
      credentials:
      - cred_id: cred_gst_001
        type: GST
        cred_data:
          gstin: 29SELLER1234F1Z5
          legal_name: Seller 3Layer Ltd
      - cred_id: cred_pan_001
        type: PAN
        cred_data:
          pan: ABCDE1234F
          name: Seller 3Layer Ltd
      contacts:
      - contact_id: contact_001
        type: AUTHORISED_SIGNATORY
        name: Seller Admin
        email: admin@seller3layer.ondc.org
        phone: '+919876543210'
      - contact_id: contact_business_001
        type: BUSINESS
        name: Business Contact
        email: business@participant.ondc.org
        phone: '+919876543210'
      key:
        uk_id: key_001
        signing_public_key: MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyzABCD==
        encryption_public_key: MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAz==
        signed_algorithm: ED25519
