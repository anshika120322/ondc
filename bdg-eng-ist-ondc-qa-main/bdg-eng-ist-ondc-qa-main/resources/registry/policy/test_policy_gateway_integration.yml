          action_to_take:
            action_type: ALLOW
    save_response:
      buyer_policy_id: policy_id
  - name: 'Step 5: Create Seller policy - ALLOW this buyer'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_seller_allow_buyer_{{timestamp}}
      participant_id: '{{seller_participant_id}}'
      type: NETWORK_PARTICIPANT
      name: Seller Allow Buyer {{timestamp}}
      description: 'Layer 3: Seller allows this buyer'
      is_active: true
      priority: 100
      rule_definition:
        rules:
        - id: SELLER-ALLOW-BUYER
          description: Seller allows buyer for RET10 search
          priority: 100
          status: ENABLED
