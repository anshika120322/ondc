            action: search
            bap_id: '{{buyer_subscriber_id}}'
            bpp_id: '{{seller_subscriber_id}}'
          action_to_take:
            action_type: ALLOW
    save_response:
      seller_policy_id: policy_id
    note: 'All three layers now allow: Network → Buyer → Seller'
- id: GW-05
  name: 'Three-Layer: Network BLOCK → Request fails at Layer 1'
  description: Network blocks at Layer 1, so Layers 2&3 never evaluated
  capture_payload: true
  steps:
  - name: 'Step 1: Create Network policy - BLOCK RET11 confirm'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_network_block_ret11_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Network Block RET11 Confirm {{timestamp}}
      description: 'Layer 1: Network blocks RET11 confirm'
      is_active: true
      priority: 100
      rule_definition:
        default_action: ALLOW
        rules:
        - id: NW-RET11-CONFIRM-BLOCK
          description: Block RET11 confirm at network layer
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET11
            action: confirm
          action_to_take:
            action_type: BLOCK
    note: Even if participant policies allow, network blocks first
- id: GW-06
  name: 'Three-Layer: Network ALLOW, Buyer BLOCK → Fails at Layer 2'
  description: Network allows but buyer blocks seller
  capture_payload: true
  steps:
  - name: 'Step 1: Create Network policy - ALLOW RET12'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_network_allow_ret12_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Network Allow RET12 {{timestamp}}
      description: 'Layer 1: Network allows RET12'
      is_active: true
      priority: 100
      rule_definition:
        default_action: BLOCK
        rules:
        - id: NW-RET12-ALLOW
          description: Allow RET12 at network layer
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET12
            action: search
          action_to_take:
            action_type: BROADCAST
  - name: 'Step 2: Create Buyer policy - NOT_ALLOW specific seller'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_buyer_block_seller_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Buyer Block Seller {{timestamp}}
      description: 'Layer 2: Buyer blocks seller (high cancel ratio)'
      is_active: true
      priority: 100
      rule_definition:
        rules:
        - id: BUYER-BLOCK-SELLER
          description: Buyer blocks specific seller
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET12
            action: search
            bap_id: buyer-test.ondc.org
            bpp_id: seller-blocked.ondc.org
          action_to_take:
            action_type: NOT_ALLOW
    note: Request fails at Layer 2 even though Layer 1 allowed
- id: GW-07
  name: 'Three-Layer: Network ALLOW, Buyer ALLOW, Seller BLOCK → Fails at Layer 3'
  description: Network and buyer allow but seller blocks buyer
  capture_payload: true
  steps:
  - name: 'Step 1: Create Seller policy - NOT_ALLOW specific buyer'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_seller_block_buyer_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Seller Block Buyer {{timestamp}}
      description: 'Layer 3: Seller blocks buyer (low fulfillment)'
      is_active: true
      priority: 100
      rule_definition:
        rules:
        - id: SELLER-BLOCK-BUYER
          description: Seller blocks specific buyer
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET13
            action: search
            bap_id: buyer-blocked.ondc.org
            bpp_id: seller-test.ondc.org
          action_to_take:
            action_type: NOT_ALLOW
    note: Final decision is NOT_ALLOW from Layer 3
