test_suite:
  name: ONDC Policy Gateway Integration Test Suite
  description: 'Complete gateway testing: BG type lookup, three-layer policy evaluation,
    API routing, runtime refresh'
  total_tests: 30
  version: '1.0'
config:
  test_environment: ondcRegistry
  default_wait_time: 2
  fail_on_error: false
  gateway_participant: gateway.network_service.ondc
  gateway_type: BG
  capture_payloads: true
gateway_config:
  gateway_url: https://gateway-preprod.ondc.org
  gateway_participant_id: gateway.network_service.ondc
lookup_config:
  host: https://registry-preprod.ondc.org
  core_version: 1.2.0
tests:
- id: GW-00
  name: 'Setup: Create test gateway participant for policy testing'
  description: Create test gateway (BG type) that can be modified for policy tests
  capture_payload: true
  steps:
  - name: 'Step 1: Create test gateway participant'
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    expected_status:
    - 200
    - 201
    - 409
    data:
      participant_id: test-gateway-{{timestamp}}.network.ondc
      action: SUBSCRIBED
      dns_skip: true
      skip_ssl_verification: true
      credentials:
      - cred_id: cred_gst_testgw
        type: GST
        cred_data:
          gstin: 29TESTGW1234F1Z5
          legal_name: Test Gateway Ltd
      - cred_id: cred_pan_testgw
        type: PAN
        cred_data:
          pan: TESTG1234W
          name: Test Gateway Ltd
      contacts:
      - contact_id: contact_gw_001
        type: AUTHORISED_SIGNATORY
        name: Gateway Admin
        email: admin@testgateway.ondc.test
        phone: '+919876543210'
      - contact_id: contact_gw_002
        type: BUSINESS
        name: Gateway Business Contact
        email: business@testgateway.ondc.test
        phone: '+919876543210'
      key:
        uk_id: key_gw_001
        signing_public_key: DtEP6Jqt7OdrgyC5Qjp2tVNxGJy4qoLHyglPPscoA7I=
        encryption_public_key: sggUQXWRch5t8tfPZrdYqrrJOamgLZVkBfqye2ac0Wk=
        signed_algorithm: ED25519
        encryption_algorithm: X25519
        valid_from: '2026-03-01T00:00:00.000Z'
        valid_until: '2027-03-01T00:00:00.000Z'
      location:
        location_id: loc_gw_001
        type: SERVICEABLE
        country: IND
        city:
        - std:080
      uri:
        uri_id: uri_gw_001
        type: CALLBACK
        url: https://seller-mock.kynondc.net/callback
      configs:
      - domain: ONDC:RET10
        np_type: BG
        subscriber_id: test-gateway.network.ondc
        location_id: loc_gw_001
        uri_id: uri_gw_001
        key_id: key_gw_001
    save_response:
      test_gateway_id: participant_id
      test_gateway_subscriber_id: configs[0].subscriber_id
    note: Test gateway can have policies created/modified unlike production gateway
- id: GW-01
  name: Gateway BG Type - Lookup gateway participant
  description: Query type=BG to get gateway configuration from registry
  capture_payload: true
  steps:
  - name: 'Step 1: Query gateway with type=BG'
    method: POST
    endpoint: /lookup
    expected_status: 200
    data:
      country: IND
      type: BG
    validate:
    - field: ''
      condition: exists
    - field: '[0].subscriber_id'
      condition: exists
    - field: '[0].type'
      condition: equals
      value: BG
    save_response:
      gateway_subscriber_id: '[0].subscriber_id'
      gateway_uk_id: '[0].uk_id'
    note: Gateway must be registered as type BG in registry
- id: GW-02
  name: Gateway BG Type - V3 Lookup with policies
  description: 'Test V3 lookup endpoint with ED25519 signature authentication'
  capture_payload: true
  v3_participant_id: test-v3-lookup-working.participant.ondc
  v3_uk_id: 83b68b94-8fb9-44ad-bcd4-b0e89d741290
  v3_private_key_seed: c190934de2c9aea71b47a31bacb8f002b0e4995c083cb457c0d58b9d6ba3670f
  steps:
  - name: 'Step 1: V3 Lookup for gateway participant'
    method: POST
    endpoint: /v3.0/lookup
    auth_type: v3_signature
    expected_status:
    - 200
    params:
      type: BG
      country: IND
    validate:
    - field: ''
      condition: exists
- id: GW-03
  name: Verify gateway has Network policies
  description: Check that gateway participant has type=NETWORK policies attached
  capture_payload: true
  steps:
  - name: 'Step 1: Get policies for gateway participant'
    method: GET
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 200
    query_params:
      participant_id: '{{test_gateway_id}}'
    validate:
    - field: policies
      condition: exists
    - field: policies
      condition: is_array
    save_response:
      gateway_policy_count: policies.length
- id: GW-04
  name: 'Three-Layer: Network ALLOW, Buyer ALLOW, Seller ALLOW → SUCCESS'
  description: 'Test complete flow: Network allows → Buyer allows → Seller allows
    → Request succeeds'
  capture_payload: true
  steps:
  - name: 'Step 1: Create Network policy - ALLOW RET10 search'
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    expected_status: 201
    data:
      policy_id: gw_network_allow_ret10_search_{{timestamp}}
      participant_id: '{{test_gateway_id}}'
      type: NETWORK
      name: Network Allow RET10 Search {{timestamp}}
      description: 'Layer 1: Network allows RET10 search'
      is_active: true
      priority: 100
      rule_definition:
        default_action: BLOCK
        rules:
        - id: NW-RET10-SEARCH-ALLOW
          description: Allow RET10 search at network layer
          priority: 100
          status: ENABLED
          match_condition:
            domain: ONDC:RET10
            action: search
          action_to_take:
            action_type: BROADCAST
    save_response:
      network_policy_id: policy_id
  - name: 'Step 2: Register Buyer participant'
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    expected_status:
    - 200
    - 201
    - 409
    data:
      participant_id: buyer_3layer_{{timestamp}}
      action: SUBSCRIBED
      dns_skip: true
      skip_ssl_verification: true
      credentials:
      - cred_id: cred_gst_001
        type: GST
        cred_data:
          gstin: 29BUYER1234F1Z5
          legal_name: Buyer 3Layer Ltd
      - cred_id: cred_pan_001
        type: PAN
        cred_data:
          pan: ABCDE1234F
          name: Buyer 3Layer Ltd
      contacts:
      - contact_id: contact_001
        type: AUTHORISED_SIGNATORY
        name: Buyer Admin
        email: admin@buyer3layer.ondc.org
        phone: '+919876543210'
      - contact_id: contact_business_001
        type: BUSINESS
        name: Business Contact
        email: business@participant.ondc.org
        phone: '+919876543210'
      key:
        uk_id: key_001
        signing_public_key: MCowBQYDK2VwAyEA1234567890abcdefghijklmnopqrstuvwxyzABCD==
        encryption_public_key: MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAz==
        signed_algorithm: ED25519
        encryption_algorithm: X25519
        valid_from: '2026-03-01T00:00:00.000Z'
        valid_until: '2027-03-01T00:00:00.000Z'
      location:
        location_id: loc_001
        type: SERVICEABLE
        country: IND
        city:
        - std:080
      uri:
        uri_id: uri_001
        type: CALLBACK
        url: https://seller-mock.kynondc.net/callback
      configs:
      - domain: ONDC:RET10
        np_type: BAP
        subscriber_id: buyer-3layer.ondc.org
        location_id: loc_001
        uri_id: uri_001
        key_id: key_001
    save_response:
