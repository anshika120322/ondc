test_suite:
  name: Policy + Lookup Integration Tests
  category: policy_lookup
  total_tests: 9
  description: End-to-end policy creation with lookup verification using all query methods
lookup_config:
  host: https://registry-uat.kynondc.net
  core_version: 1.2.0
config:
  auth_type: admin
  default_timeout: 30
  retry_on_failure: false
tests:
- id: PL01
  name: "Register \u2192 Create Policy \u2192 Verify Policy \u2192 Lookup by participant_id"
  description: Full workflow with lookup verification using participant_id query
  steps:
  - name: 'Step 1: Register participant'
    type: api
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    data:
      dns_skip: true
      skip_ssl_verification: true
      participant_id: '{{participant_id}}'
      action: SUBSCRIBED
      credentials:
      - cred_id: cred_gst_001
        type: GST
        cred_data:
          gstin: 29ABCDE1234F1Z5
          legal_name: Policy Lookup Test Company Ltd
      - cred_id: cred_pan_001
        type: PAN
        cred_data:
          pan: ABCDE1234F
          name: Policy Lookup Test Company Ltd
      contacts:
      - contact_id: contact_auth_001
        type: AUTHORISED_SIGNATORY
        name: Test Admin
        email: admin@policylookuptest.ondc.org
        phone: '+919876543211'
      - contact_id: contact_biz_001
        type: BUSINESS
        name: Business Manager
        email: business@policylookuptest.ondc.org
        phone: '+919876543212'
      key:
        uk_id: '{{uk_id}}'
        signing_public_key: '{{signing_public_key}}'
        encryption_public_key: '{{encryption_public_key}}'
        signed_algorithm: ED25519
        encryption_algorithm: X25519
        valid_from: '{{valid_from}}'
        valid_until: '{{valid_until}}'
      location:
        location_id: loc_001
        type: SERVICEABLE
        country: IND
        city:
        - std:080
      uri:
        uri_id: uri_callback_001
        type: CALLBACK
        url: https://policylookuptest.ondc.org/callback
      configs:
      - domain: ONDC:RET12
        np_type: BPP
        subscriber_id: '{{subscriber_id}}'
        location_id: loc_001
        uri_id: uri_callback_001
        key_id: '{{uk_id}}'
    expected_status:
    - 200
    - 409
  - name: 'Step 2: Create NETWORK policy'
    type: api
    method: POST
    endpoint: /admin/policies
    auth_type: admin
    data:
      description: NETWORK routing policy for RET12 domain (participant_id test)
      is_active: true
      metadata:
        test_type: participant_id_lookup
      name: RET12 Routing Policy {{timestamp}}
      participant_id: '{{participant_id}}'
      policy_id: policy-pl01-{{timestamp}}
      priority: 100
      rule_definition:
        rules:
        - action_to_take:
            action_type: ROUTING
            target_url: https://gateway.example.com/search
          description: Route RET12 search to gateway
          id: rule-pl01-001
          match_condition:
            action: search
            domain: ONDC:RET12
          priority: 100
          status: ENABLED
      type: NETWORK
    expected_status: 201
    validate:
    - field: type
      value: NETWORK
    - field: participant_id
      value: '{{participant_id}}'
  - name: 'Step 3: Verify policy created'
    type: api
    method: GET
    endpoint: /admin/policies
    auth_type: admin
    query_params:
      participant_id: '{{participant_id}}'
    expected_status: 200
  - name: 'Step 4: Lookup by participant_id'
    type: lookup
    lookup_type: participant_id
    expected_status: 200
