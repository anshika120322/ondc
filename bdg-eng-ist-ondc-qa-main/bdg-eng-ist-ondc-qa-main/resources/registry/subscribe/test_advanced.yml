    method: PATCH
    endpoint: /admin/subscribe
    auth_type: admin
    data:
      participant_id: '{{subscriber_id}}'
      configs:
      - domain: ONDC:RET10
        np_type: BAP
        subscriber_id: '{{subscriber_id}}'
        location_id: loc001
        uri_id: uri001
        key_id: '{{uk_id}}'
