test_suite:
  name: Advanced Scenarios
  category: advanced
  total_tests: 15
  description: Advanced testing including multi-domain operations, concurrency, performance, and edge cases
config:
  default_timeout: 60
  retry_on_failure: false
tests:
- id: D01
  name: Participant with 5+ domains, update each independently
  description: Test granular per-domain configuration management
  workflow: true
  steps:
  - name: Admin creates with 5 domains
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    data:
      participant_id: '{{subscriber_id}}'
      action: SUBSCRIBED
      credentials:
      - cred_id: cred_gst_001
        type: GST
        cred_data:
          gstin: 29ABCDE1234F1Z5
          legal_name: MultiDomain Test Pvt Ltd
      - cred_id: cred_pan_001
        type: PAN
        cred_data:
          pan: ABCDE1234F
          name: MultiDomain Test Pvt Ltd
      contacts:
      - contact_id: contact_auth_001
        type: AUTHORISED_SIGNATORY
        name: Admin User
        email: admin@{{subscriber_id}}
        phone: '+919876543211'
      - contact_id: contact_biz_001
        type: BUSINESS
        name: Business Manager
        email: business@{{subscriber_id}}
        phone: '+919876543213'
      - contact_id: contact_tech_001
        type: TECHNICAL
        name: Tech Support
        email: tech@{{subscriber_id}}
        phone: '+919876543210'
      key:
        uk_id: '{{uk_id}}'
        signing_public_key: '{{signing_public_key}}'
        encryption_public_key: '{{encryption_public_key}}'
        signed_algorithm: ED25519
        encryption_algorithm: X25519
        valid_from: '2026-02-01T00:00:00.000Z'
        valid_until: '2027-02-01T00:00:00.000Z'
      location:
        location_id: loc001
        type: SERVICEABLE
        country: IND
        city:
        - std:080
      uri:
        uri_id: uri001
        type: CALLBACK
        url: https://{{subscriber_id}}/callback
      configs:
      - domain: ONDC:RET10
        np_type: BPP
        subscriber_id: '{{subscriber_id}}'
        location_id: loc001
        uri_id: uri001
        key_id: '{{uk_id}}'
      - domain: ONDC:RET11
        np_type: BPP
        subscriber_id: '{{subscriber_id}}'
        location_id: loc001
        uri_id: uri001
        key_id: '{{uk_id}}'
      - domain: ONDC:RET12
        np_type: BAP
        subscriber_id: '{{subscriber_id}}'
        location_id: loc001
        uri_id: uri001
