payload_templates:
  minimal_subscribe:
    request_id: '{{request_id}}'
    uk_id: '{{uk_id}}'
    participant_id: '{{subscriber_id}}'
    credentials:
    - cred_id: cred001
      type: GST
      cred_data:
        gstin: 29ABCDE1234F1Z5
        legal_name: Test Company Private Limited
    - cred_id: cred002
      type: PAN
      cred_data:
        pan_no: ABCDE1234F
    contacts:
    - contact_id: contact001
      name: Test Contact
      email: contact@example.com
      phone: '+919876543210'
      type: AUTHORISED_SIGNATORY
    - contact_id: contact002
      name: Business Contact
      email: business@example.com
      phone: '+919876543211'
      type: BUSINESS
    key:
      uk_id: '{{uk_id}}'
      signing_public_key: '{{signing_public_key}}'
      encryption_public_key: '{{encryption_public_key}}'
      signed_algorithm: ED25519
      encryption_algorithm: X25519
      valid_from: '{{valid_from}}'
      valid_until: '{{valid_until}}'
    location:
      location_id: loc001
      country: IND
      city:
      - std:080
      type: SERVICEABLE
    uri:
      uri_id: uri001
      type: CALLBACK
      url: https://{{subscriber_id}}/ondc/callback
    configs:
    - domain: '{{domain}}'
      np_type: '{{np_type_mapped}}'
      subscriber_id: '{{subscriber_id}}'
      location_id: loc001
      uri_id: uri001
      key_id: '{{uk_id}}'
    dns_skip: true
    skip_ssl_verification: true
  full_subscribe:
    extends: minimal_subscribe
    additional:
      credentials:
      - cred_id: cred003
        type: FSSAI
        cred_data:
          license_no: '12345678901234'
      contacts:
      - contact_id: contact003
        name: Support Team
        email: support@example.com
        phone: '+919876543212'
        type: SUPPORT
  multi_field_update:
    credentials:
    - cred_id: cred_multi
      type: GST
      cred_data:
        gstin: 29MULTI9999Z9Z9
    contacts:
    - contact_id: contact_multi
      name: Multi Update Contact
      email: multi@example.com
      phone: '+919999999999'
      type: TECHNICAL
    location:
      location_id: loc_multi
      country: IND
      city:
      - std:080
      - std:011
      type: SERVICEABLE
    dns_skip: true
    skip_ssl_verification: true
  admin_whitelist:
    participant_id: '{{subscriber_id}}'
    action: WHITELISTED
    key:
      uk_id: '{{uk_id}}'
      signing_public_key: '{{signing_public_key}}'
      encryption_public_key: '{{encryption_public_key}}'
      signed_algorithm: ED25519
      encryption_algorithm: X25519
      valid_from: '{{valid_from}}'
      valid_until: '{{valid_until}}'
    configs:
    - domain: '{{domain}}'
      np_type: '{{np_type_mapped}}'
      subscriber_id: '{{subscriber_id}}'
    dns_skip: true
    skip_ssl_verification: true
