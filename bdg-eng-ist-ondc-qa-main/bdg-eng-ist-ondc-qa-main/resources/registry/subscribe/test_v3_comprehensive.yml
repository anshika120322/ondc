test_suite:
  name: V3 Comprehensive Test Suite
  version: '2.0'
  total_tests: 44
  description: Complete V3 API testing covering self-subscribe, updates, and comprehensive negative scenarios including all mandatory field validations
config:
  auth_type: v3
  default_timeout: 30
  base_url: https://registry-uat.kynondc.net
tests:
- id: V00
  name: Subscribe without whitelist
  description: Participant attempts to self-subscribe without being whitelisted (negative)
  type: negative
  expected_result: fail
  steps:
  - action: v3_subscribe
    method: POST
    endpoint: /api/v3/subscribe
    signature_mode: normal
    generate_fresh_keys: true
    payload_template: minimal_subscribe
    domain: ONDC:RET10
    np_type: seller
    expected_status:
    - 400
    validate:
    - type: status_code
      expected: 400
      message: Correctly rejected subscribe without whitelist
- id: V01
  name: "WHITELISTED \u2192 SUBSCRIBED (minimal)"
  description: Participant self-subscribes with minimal required fields after whitelisting
  type: workflow
  expected_result: pass
  steps:
  - action: admin_whitelist
    method: POST
    endpoint: /admin/subscribe
    auth_type: admin
    generate_fresh_keys: true
    payload_template: admin_whitelist
    domain: ONDC:RET10
    np_type: seller
    expected_status:
    - 200
  - action: v3_subscribe
    method: POST
    endpoint: /api/v3/subscribe
    signature_mode: normal
    use_keys_from_step: 0
    payload_template: minimal_subscribe
    domain: ONDC:RET10
    np_type: seller
    expected_status:
    - 200
    validate:
    - type: status_code
      expected: 200
      message: Successfully subscribed with minimal fields
- id: V02
  name: "WHITELISTED \u2192 SUBSCRIBED (full)"
