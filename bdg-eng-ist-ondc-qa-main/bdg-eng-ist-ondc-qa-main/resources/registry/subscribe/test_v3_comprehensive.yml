- id: V21
  name: Cross-participant update (negative)
  description: Attempt to update different participant (should fail 401)
  type: negative
  expected_result: fail
  steps:
  - action: create_subscribed
    helper: create_whitelisted_and_subscribe
    domain: ONDC:RET10
    np_type: seller
    save_as: participant_a
  - action: create_subscribed
    helper: create_whitelisted_and_subscribe
    domain: ONDC:RET11
    np_type: buyer
    save_as: participant_b
  - action: v3_patch
    method: PATCH
    endpoint: /api/v3/subscribe
    signature_mode: normal
    use_keys_from: participant_b
    participant_id_from: participant_a
    payload:
      contacts:
      - contact_id: malicious
        email: hack@example.com
      dns_skip: true
      skip_ssl_verification: true
    expected_status:
    - 401
    validate:
    - type: status_code
      expected: 401
      message: Correctly rejected cross-participant update
