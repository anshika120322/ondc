test_suite:
  name: Admin End-to-End Tests
  category: admin
  total_tests: 52
  description: Complete Admin API testing including creates, transitions, updates, workflows, and validations
config:
  auth_type: admin
  default_timeout: 30
  retry_on_failure: false
tests:
- id: A01
  name: Create WHITELISTED participant (minimal fields)
  description: Admin creates participant with minimal required fields in WHITELISTED status
  method: POST
  endpoint: /admin/subscribe
  auth_type: admin
  data:
    participant_id: '{{subscriber_id}}'
    action: WHITELISTED
    uri:
      uri_id: uri_callback_001
      type: CALLBACK
      url: https://seller-mock.kynondc.net
    configs:
    - domain: ONDC:RET10
      np_type: BPP
      subscriber_id: '{{subscriber_id}}'
      uri_id: uri_callback_001
    dns_skip: true
    skip_ssl_verification: true
  expected_status: 200
  validate:
  - field: message.ack.status
    value: ACK
- id: A02
  name: Create WHITELISTED participant (all fields)
  description: Admin creates participant with all possible fields populated
  method: POST
