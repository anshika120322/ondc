
ondcGatewayLookup: # Environment name for all Gateway Lookup tests
  host: "http://35.244.48.178:8080" # Lookup API URL
  lookup_host: "http://35.244.48.178:8080"
  core_version: "1.2.0"
  
  # NOTE: Lookup API does not require authentication credentials
  # It returns public participant information including subscriber_id and ukId
  
  # Test domains
  domains:
    - "ONDC:RET10"  # Grocery
    - "ONDC:RET11"  # F&B
    - "ONDC:RET12"  # Fashion
    - "ONDC:RET13"  # Electronics
    - "ONDC:RET14"  # Home & Kitchen
    - "ONDC:RET15"  # Beauty & Personal Care
    - "ONDC:RET16"  # Health & Wellness
  
  # Test cities
  cities:
    - "std:080"  # Bangalore
    - "std:022"  # Mumbai
    - "std:011"  # Delhi
    - "std:040"  # Hyderabad
    - "std:033"  # Kolkata
    - "std:020"  # Pune
    - "std:044"  # Chennai
  
  # Performance thresholds
  performance:
    max_response_time_ms: 300  # Lookup should be faster than search
    max_p95_response_time_ms: 500
    min_throughput_rps: 150
  
  # Test configuration
  test_config:
    request_timeout_seconds: 10
    max_retries: 3
