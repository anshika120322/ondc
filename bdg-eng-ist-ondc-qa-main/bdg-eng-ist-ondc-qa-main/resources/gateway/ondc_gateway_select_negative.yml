  # Payment types
  payment_types:
    ONDC:RET10:
      - type: "ON-ORDER"
        status: "PAID"
        collected_by: "BAP"
        description: "Customer pays at order placement (UPI/card/wallet)"
      - type: "ON-FULFILLMENT"
        status: "NOT-PAID"
        collected_by: "BPP"
        description: "Cash on delivery collected by seller"
    ONDC:FIS12:
      - type: "PRE-FULFILLMENT"
        status: "PAID"
        collected_by: "BAP"
        description: "Loan application or processing fee"
      - type: "ON-FULFILLMENT"
        status: "NOT-PAID"
        collected_by: "BPP"
        description: "Loan disbursement to borrower"

  # Fulfillment types
  fulfillment_types:
    ONDC:RET10:
      - type: "Delivery"
        description: "Order delivered to the customer address"
      - type: "Self-Pickup"
        description: "Customer picks up the order from the store"
    ONDC:FIS12:
      - type: "Digital"
        description: "Loan processed digitally and disbursed to bank account"
      - type: "Account-Credit"
        description: "Loan amount credited directly to borrower account"

  # Delivery locations with GPS
  test_locations:
    - city: "std:080"
      gps: "12.9492953,77.7019878"
      area_code: "560001"
      address: "123 Test Street, Bangalore 560001"
      radius_km: 5

  # Settlement details for payment
  settlement_details:
    - settlement_counterparty: "seller-app"
      settlement_phase: "sale-amount"
      settlement_type: "neft"
      beneficiary_name: "Seller Account"
      settlement_bank_account_no: "1234567890"
      settlement_ifsc_code: "HDFC0001234"
      bank_name: "HDFC Bank"

  # Performance thresholds
  performance:
    max_response_time_ms: 500
    max_p95_response_time_ms: 1000
    min_throughput_rps: 100

  # Test configuration
  test_config:
    signature_ttl_seconds: 300
    request_timeout_seconds: 10
    max_retries: 1

  # Payload defaults
  country: "IND"
  currency: "INR"
  request_ttl: "PT30S"
  finder_fee_type: "percent"
  finder_fee_amount: "3.0"
  default_order_amount: "500.00"
  default_delivery_charge: "50.00"

  # Default test buyer details
  test_buyer:
    name: "Test Buyer"
    phone: "9876543210"
    email: "buyer@example.com"
    address_prefix: "123 Test Street, Bangalore"
    gstin: "GSTIN123456789"
    org_name: "Test Buyer Org"

  # Seller/store location GPS (used in on_select backward flow)
  seller_source_gps: "12.9063433,77.5856825"
  seller_source_address: "Seller Warehouse, Bangalore"
  seller_agent_phone: "8888888888"
  delivery_agent_phone: "9999999999"
