  # Test delivery cities (minimal for negative tests)
  cities:
    - "std:080"  # Bangalore
    - "std:022"  # Mumbai

  # Test providers (domain-keyed, minimal for negative tests)
  test_providers:
    ONDC:RET10:
      - id: "provider-ret-001"
        name: "Fresh Grocery Store"
        location_id: "store-location-001"
        category: "Grocery"
        fulfillment_types:
          - "Delivery"
          - "Self-Pickup"
        rating: "4.5"
    ONDC:FIS12:
      - id: "provider-fis-001"
        name: "ABC Finance Ltd"
        location_id: "fis-location-001"
        category: "PERSONAL_LOAN"
        fulfillment_types:
          - "Digital"
        rating: "4.4"

  # Test items (domain-keyed, minimal for negative tests)
  test_data:
    ONDC:RET10:
      test_items:
        - id: "item-001"
          name: "Basmati Rice 5kg"
          price: "450.00"
          category_id: "Grocery"
          fulfillment_id: "F1"
          location_id: "L1"
    ONDC:FIS12:
      test_items:
        - id: "loan-001"
          name: "Instant Personal Loan"
          category_id: "PERSONAL_LOAN"
          loan_amount: "50000"
