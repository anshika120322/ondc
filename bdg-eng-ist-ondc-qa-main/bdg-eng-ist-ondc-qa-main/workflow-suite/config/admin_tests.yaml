# ==========================================

  - id: "A54"
    name: "WHITELISTED->SUBSCRIBED must not duplicate config rows"
    description: |
      Regression test: create a participant with exactly 1 WHITELISTED config,
      verify 1 config exists, then PATCH to SUBSCRIBED (with full entity data for
      the same config), and verify the config table still contains exactly 1 record
      for this participant.  Before the fix, adminUpsertEntitiesAndTransition
      would blindly INSERT a second config row (no unique constraint on the table),
      so the final GET would return 2 records instead of 1.
    workflow: true
    steps:
      - name: "Step 1 – Create minimal WHITELISTED participant (1 config, no entity refs)"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          dns_skip: true
          skip_ssl_verification: true
          participant_id: "{{subscriber_id}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET10"
              np_type: "BAP"
              subscriber_id: "{{subscriber_id}}"
        expected_status: 200
        validate:
          - field: "message.ack.status"
            value: "ACK"

      - name: "Step 2 – Verify exactly 1 config row exists after WHITELISTED create"
        method: "GET"
        endpoint: "/admin/configs/participant/{{subscriber_id}}"
        auth_type: "admin"
        expected_status: 200
        validate:
          - field: ""
            array_length: 1

      - name: "Step 3 – PATCH to SUBSCRIBED with full entity data for the same config"
