    auth_type: "admin"
    data:
      dns_skip: true
      skip_ssl_verification: true
      participant_id: "{{subscriber_id}}"
      action: "WHITELISTED"
      configs:
        - domain: "ONDC:RET1A"
          np_type: "BPP"
          subscriber_id: "{{subscriber_id}}"
