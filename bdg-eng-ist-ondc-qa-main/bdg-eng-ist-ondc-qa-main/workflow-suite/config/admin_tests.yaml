  - id: "A58"
    name: "Policy lifecycle: Active → Expired + immutability check (with version tracking)"
    description: |
      Creates a participant with an active policy (version=1), verifies initial state,
      patches is_expired to true (forces is_active=false, version→2), verifies the expired state,
      then attempts a second PATCH which must be rejected with 409 Conflict (expired policies are immutable).
    workflow: true
    steps:
      - name: "Step 1 – Create participant with active policy"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
