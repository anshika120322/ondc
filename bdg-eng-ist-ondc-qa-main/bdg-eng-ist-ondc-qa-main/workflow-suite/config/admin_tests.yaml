# Admin End-to-End Test Configuration
# 53 comprehensive tests for Admin API flows

test_suite:
  name: "Admin End-to-End Tests"
  category: "admin"
  total_tests: 61
  description: "Complete Admin API testing including creates, transitions, updates, workflows, validations, WHITELISTED config upsert, policy management, DNS validation, policy version/expiry, and policy lifecycle flows"

# Test configuration
config:
  auth_type: "admin"
  default_timeout: 30
  retry_on_failure: false

