              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "D01 Multi Domain"
            - cred_id: "cred_pan_d01"
              type: "PAN"
              cred_data:
                pan_no: "ABCDE1234F"
