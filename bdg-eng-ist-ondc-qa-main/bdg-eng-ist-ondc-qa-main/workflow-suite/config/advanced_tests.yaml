            encryption_public_key: "MCowBQYDK2VwAyEA9876543210ZYXWVUTSRQPONMLKJIHGFEDCBAzyxwvutsrqponmlkjihgfedcba=="
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "2026-02-04T00:00:00.000Z"
            valid_until: "2027-02-04T00:00:00.000Z"
          location:
            location_id: "loc_d06"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_d06"
            type: "CALLBACK"
            url: "https://{{subscriber_id}}/callback"
          configs:
            - domain: "ONDC:RET10"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_d06"
              uri_id: "uri_d06"
              key_id: "key_advanced_001"
        expected_status: 200
        
      - name: "Admin updates location (concurrent)"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        concurrent: true
        data:
          participant_id: "{{subscriber_id}}"
