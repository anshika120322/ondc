            location_id: "loc_d06"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080", "std:011"]
        expected_status: [200, 409]
        
      - name: "V3 updates contacts (concurrent)"
        method: "PATCH"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
