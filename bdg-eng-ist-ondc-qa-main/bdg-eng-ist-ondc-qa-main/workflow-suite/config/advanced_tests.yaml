# ==========================================
# 4.2 CONCURRENCY & PERFORMANCE (5 tests)
# ==========================================

  - id: "D06"
    name: "Concurrent Admin + V3 updates on same participant"
    description: "Test race condition handling"
    workflow: true
    concurrent_steps: true
    steps:
      - name: "Setup participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "{{subscriber_id}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_d06"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
