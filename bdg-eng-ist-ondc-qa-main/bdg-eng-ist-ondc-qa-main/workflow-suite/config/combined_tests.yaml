# Combined Admin + V3 Workflow Tests (Positive Scenarios Only)
# Tests Admin ↔ V3 API interactions and collaboration workflows

test_suite:
  name: "Combined Admin + V3 Workflow Tests"
  category: "combined"
  total_tests: 20
  description: "Positive workflows testing Admin and V3 API interactions, state transitions, entity management, and multi-domain scenarios"

# Test configuration
config:
  default_timeout: 30
  retry_on_failure: false

# ==========================================
# 1. STATUS TRANSITION WORKFLOWS (6 tests)
# ==========================================

tests:
  - id: "C01"
    name: "Admin WHITELISTED → V3 SUBSCRIBED"
    description: "Admin creates WHITELISTED, participant self-subscribes via V3"
    workflow: true
    steps:
      - name: "Admin creates WHITELISTED"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "{{subscriber_id}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
        expected_status: 200
        
      - name: "V3 self-subscribe to SUBSCRIBED"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "{{subscriber_id}}"
          credentials:
            - cred_id: "cred_gst_c01"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "C01 Test Company"
            - cred_id: "cred_pan_c01"
              type: "PAN"
              cred_data:
                pan: "ABCDE1234F"
          contacts:
            - contact_id: "contact_auth_c01"
              name: "C01 Authorized"
              email: "auth@c01.example.com"
              phone: "+919876543210"
              type: "AUTHORISED_SIGNATORY"
            - contact_id: "contact_biz_c01"
              name: "C01 Business"
              email: "biz@c01.example.com"
              phone: "+919876543211"
              type: "BUSINESS"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_c01"
            country: "IND"
            city: ["std:080"]
            type: "SERVICEABLE"
          uri:
            uri_id: "uri_c01"
            type: "CALLBACK"
            url: "https://{{subscriber_id}}/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
              location_id: "loc_c01"
              uri_id: "uri_c01"
              key_id: "{{uk_id}}"
        expected_status: 200

