        expected_status: 200
      
      - name: "Verify all entities deleted"
        method: "GET"
        endpoint: "/admin/participants/cascade_test_{{timestamp}}"
        auth_type: "admin"
        expected_status: 404

  - id: "INT08"
    name: "Multi-config transaction integrity"
    description: "Test transaction rollback on multi-config creation failure"
    steps:
      - name: "Create participant with multiple configs, one invalid"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "multi_config_{{timestamp}}"
          action: "SUBSCRIBED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "multi_config_{{timestamp}}"
            - domain: "INVALID_DOMAIN"
              np_type: "BPP"
              subscriber_id: "multi_config_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Verify no configs were created"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "admin"
        validate:
          - field: "participants"
            not_contains: "multi_config"

# ==================================================================
# SECTION 3: CROSS-FEATURE INTEGRATION (4 tests)
# ==================================================================

  - id: "INT09"
    name: "DNS validation integration with subscription"
