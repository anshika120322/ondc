# Integration Tests - System-Level Testing
# Tests authentication, database, cross-component, and system behaviors
# Focus: Integration points, not individual features

test_suite:
  name: "Integration Tests"
  category: "integration"
  total_tests: 15
  description: "System-level integration testing covering authentication, database transactions, cross-feature interactions, and performance scenarios"

config:
  default_timeout: 60
  retry_on_failure: false

# ==================================================================
# SECTION 1: AUTHENTICATION & AUTHORIZATION INTEGRATION (4 tests)
# ==================================================================

tests:
  - id: "INT01"
    name: "Admin JWT authentication flow"
    description: "Test complete Admin authentication with JWT token generation and validation"
    steps:
      - name: "Admin login with credentials"
        method: "POST"
        endpoint: "/admin/login"
        auth_type: "none"
        data:
          username: "{{admin_username}}"
          password: "{{admin_password}}"
        expected_status: 200
        save_token: true
      
      - name: "Use JWT token for protected operation"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "admin"
        expected_status: 200

  - id: "INT02"
    name: "V3 ONDC signature authentication flow"
    description: "Test complete V3 authentication with Ed25519 signature validation"
    steps:
      - name: "V3 request with ONDC signature"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "{{subscriber_id}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "{{subscriber_id}}"
        validate_signature: true
        expected_status: [200, 400]

  - id: "INT03"
    name: "Cross-API authentication isolation"
    description: "Verify admin JWT cannot access V3 endpoints and vice versa"
    steps:
      - name: "Admin login"
        method: "POST"
        endpoint: "/admin/login"
        auth_type: "none"
        data:
          username: "{{admin_username}}"
          password: "{{admin_password}}"
        expected_status: 200
        save_token: true
      
      - name: "Try admin JWT on V3 endpoint (should fail)"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "admin"
        data:
          request_id: "{{request_id}}"
          participant_id: "{{subscriber_id}}"
        expected_status: [401, 403]

  - id: "INT04"
    name: "Token expiration and refresh flow"
    description: "Test JWT token expiration handling"
    steps:
      - name: "Admin login"
        method: "POST"
        endpoint: "/admin/login"
        auth_type: "none"
        data:
          username: "{{admin_username}}"
          password: "{{admin_password}}"
        expected_status: 200
        save_token: true
      
      - name: "Make authenticated request"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "admin"
        expected_status: 200

# ==================================================================
# SECTION 2: DATABASE & TRANSACTION INTEGRATION (4 tests)
# ==================================================================

  - id: "INT05"
    name: "Participant creation with transaction rollback on error"
    description: "Test database transaction integrity on partial failure"
    steps:
      - name: "Attempt participant creation with invalid data"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "test_rollback_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "invalid_cred"
              type: "INVALID_TYPE"
              cred_data: {}
        expected_status: [400, 422]
      
      - name: "Verify participant was not created"
        method: "GET"
        endpoint: "/admin/participants"
        auth_type: "admin"
        validate:
          - field: "participants"
            not_contains: "test_rollback"

  - id: "INT06"
    name: "Concurrent participant updates"
    description: "Test database locking and concurrent update handling"
    concurrent: true
    steps:
      - name: "Create participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "concurrent_test_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_int06"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "INT06 Concurrent Test"
          contacts:
            - contact_id: "contact_auth_int06"
              type: "AUTHORISED_SIGNATORY"
              name: "INT06 Auth"
              email: "int06@example.com"
              phone: "+919876543000"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_int06"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_int06"
            type: "CALLBACK"
            url: "https://int06.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "concurrent_test_{{timestamp}}"
              location_id: "loc_int06"
              uri_id: "uri_int06"
              key_id: "{{uk_id}}"
        expected_status: 200
      
      - name: "Concurrent update from Admin"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        concurrent: true
        data:
          participant_id: "concurrent_test_{{timestamp}}"
          action: "INACTIVE"
        expected_status: [200, 409]
      
      - name: "Concurrent update from V3"
        method: "PATCH"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        concurrent: true
        data:
          request_id: "{{request_id}}"
          participant_id: "concurrent_test_{{timestamp}}"
          uk_id: "{{uk_id}}"
          contacts:
            - contact_id: "contact_auth_int06"
              type: "AUTHORISED_SIGNATORY"
              name: "INT06 Auth Updated"
              email: "int06-updated@example.com"
              phone: "+919123456000"
        expected_status: [200, 409]

