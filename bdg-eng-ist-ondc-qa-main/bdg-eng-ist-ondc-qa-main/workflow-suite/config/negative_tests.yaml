# Negative Tests - Error Scenario Testing
# Tests error handling, validation, and edge cases
# Focus: All negative scenarios grouped by source (Admin, V3, Combined)

test_suite:
  name: "Negative Error Tests"
  category: "negative"
  total_tests: 36
  description: "Comprehensive error scenario testing for Admin API, V3 API, combined workflows, and policy validation"

config:
  default_timeout: 30
  retry_on_failure: false

# ==================================================================
# SECTION 1: ADMIN API NEGATIVE SCENARIOS (10 tests)
# ==================================================================

tests:
  - id: "N01"
    name: "Admin POST invalid action"
    description: "Try creating participant with INACTIVE or SUSPENDED action"
    steps:
      - name: "Attempt POST with INACTIVE action"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_action_{{timestamp}}"
          action: "INACTIVE"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_action_{{timestamp}}"
        expected_status: [400, 422]
        validate:
          - field: "error"
            contains: ["action", "WHITELISTED", "SUBSCRIBED"]

  - id: "N02"
    name: "Admin POST duplicate participant_id"
    description: "Try creating participant with existing ID"
    steps:
      - name: "Create first participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "duplicate_test_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "duplicate_test_{{timestamp}}"
        expected_status: 200
      
      - name: "Attempt duplicate creation"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "duplicate_test_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET15"
              np_type: "BAP"
              subscriber_id: "duplicate_test_{{timestamp}}"
        expected_status: [409, 422]
        validate:
          - field: "error"
            contains: ["exists", "duplicate"]

  - id: "N03"
    name: "Admin POST missing required fields"
    description: "Try creating participant without required fields"
    steps:
      - name: "Missing participant_id"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
        expected_status: [400, 422]
      
      - name: "Missing action"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_action_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
        expected_status: [400, 422]
      
      - name: "Missing configs"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_configs_{{timestamp}}"
          action: "WHITELISTED"
        expected_status: [400, 422]

  - id: "N04"
    name: "Admin POST invalid domain/np_type"
    description: "Try creating with invalid domain or np_type values"
    steps:
      - name: "Invalid domain"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_domain_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "INVALID:DOMAIN"
              np_type: "BPP"
              subscriber_id: "invalid_domain_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Invalid np_type"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_nptype_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "INVALID_TYPE"
              subscriber_id: "invalid_nptype_{{timestamp}}"
        expected_status: [400, 422]

  - id: "N05"
    name: "Admin POST invalid credential format"
    description: "Try creating with malformed credentials"
    steps:
      - name: "Invalid GST format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_gst_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_n05"
              type: "GST"
              cred_data:
                gstin: "INVALID_GST"
                legal_name: "N05 Test"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_gst_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Missing credential fields"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_cred_fields_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_incomplete"
              type: "GST"
              cred_data: {}
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "missing_cred_fields_{{timestamp}}"
        expected_status: [400, 422]

  - id: "N06"
    name: "Admin POST invalid contact format"
    description: "Try creating with malformed contacts"
    steps:
      - name: "Invalid email format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_email_{{timestamp}}"
          action: "SUBSCRIBED"
          contacts:
            - contact_id: "contact_n06"
              type: "AUTHORISED_SIGNATORY"
              name: "N06 Contact"
              email: "invalid-email-format"
              phone: "+919876543000"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_email_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Invalid phone format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_phone_{{timestamp}}"
          action: "SUBSCRIBED"
          contacts:
            - contact_id: "contact_n06_phone"
              type: "AUTHORISED_SIGNATORY"
              name: "N06 Contact"
              email: "n06@example.com"
              phone: "invalid_phone"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_phone_{{timestamp}}"
        expected_status: [400, 422]

  - id: "N07"
    name: "Admin PATCH non-existent participant"
    description: "Try updating participant that doesn't exist"
    steps:
      - name: "PATCH non-existent participant"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "non_existent_participant_{{timestamp}}"
          action: "INACTIVE"
        expected_status: 404
        validate:
          - field: "error"
            contains: ["not found", "does not exist"]

  - id: "N08"
    name: "Admin PATCH invalid status transition"
    description: "Try invalid status transitions"
    steps:
      - name: "Create WHITELISTED participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_transition_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_transition_{{timestamp}}"
        expected_status: 200
      
      - name: "Try transition to UNSUBSCRIBED (invalid from WHITELISTED)"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_transition_{{timestamp}}"
          action: "UNSUBSCRIBED"
        expected_status: [400, 422]
        validate:
          - field: "error"
            contains: ["transition", "invalid"]

  - id: "N09"
    name: "Admin POST invalid key format"
    description: "Try creating with malformed cryptographic keys"
    steps:
      - name: "Invalid signing algorithm"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_key_algo_{{timestamp}}"
          action: "SUBSCRIBED"
          key:
            uk_id: "uk_n09"
            signing_public_key: "invalid_key_format"
            encryption_public_key: "invalid_key_format"
            signed_algorithm: "INVALID_ALGO"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_key_algo_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Expired key validity"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "expired_key_{{timestamp}}"
          action: "SUBSCRIBED"
          key:
            uk_id: "uk_n09_expired"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "2020-01-01T00:00:00Z"
            valid_until: "2020-12-31T23:59:59Z"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "expired_key_{{timestamp}}"
        expected_status: [400, 422]

  - id: "N10"
    name: "Admin POST invalid location/URI format"
    description: "Try creating with malformed location or URI"
    steps:
      - name: "Invalid location city format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_location_{{timestamp}}"
          action: "SUBSCRIBED"
          location:
            location_id: "loc_n10"
            type: "SERVICEABLE"
            country: "IND"
            city: ["invalid_city_format"]
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_location_{{timestamp}}"
        expected_status: [400, 422]
      
      - name: "Invalid URI format"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_uri_{{timestamp}}"
          action: "SUBSCRIBED"
          uri:
            uri_id: "uri_n10"
            type: "CALLBACK"
            url: "not_a_valid_url"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_uri_{{timestamp}}"
        expected_status: [400, 422]

# ==================================================================
# SECTION 2: V3 API NEGATIVE SCENARIOS (10 tests)
# ==================================================================

  - id: "N11"
    name: "V3 POST without pre-whitelisting"
    description: "Try V3 subscription without admin whitelisting"
    steps:
      - name: "Attempt V3 subscribe without whitelist"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "not_whitelisted_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "not_whitelisted_{{timestamp}}"
        expected_status: [403, 404]
        validate:
          - field: "error"
            contains: ["whitelist", "not found", "not allowed"]

  - id: "N12"
    name: "V3 POST invalid ONDC signature"
    description: "Try V3 request with invalid signature"
    steps:
      - name: "Admin whitelists participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "invalid_signature_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_signature_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 request with invalid signature"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        invalid_signature: true
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "invalid_signature_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "invalid_signature_{{timestamp}}"
        expected_status: [401, 403]
        validate:
          - field: "error"
            contains: ["signature", "authentication"]

  - id: "N13"
    name: "V3 POST missing required entities"
    description: "Try V3 subscription without required entities"
    steps:
      - name: "Admin whitelists"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "missing_entities_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "missing_entities_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 subscribe without credentials"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "missing_entities_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "missing_entities_{{timestamp}}"
        expected_status: [400, 422]
        validate:
          - field: "error"
            contains: ["credential", "required"]

  - id: "N14"
    name: "V3 POST DNS validation failure"
    description: "Try V3 subscription with failing DNS validation"
    steps:
      - name: "Admin whitelists"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "dns_fail_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "dns_fail_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 subscribe with DNS validation enabled and invalid domain"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        query_params:
          dns_skip: "false"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "dns_fail_{{timestamp}}"
          credentials:
            - cred_id: "cred_gst_n14"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N14 DNS Test"
          contacts:
            - contact_id: "contact_auth_n14"
              type: "AUTHORISED_SIGNATORY"
              name: "N14 Auth"
              email: "n14@example.com"
              phone: "+919876543014"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_n14"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_n14"
            type: "CALLBACK"
            url: "https://nonexistent-domain-for-testing.invalid/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "dns_fail_{{timestamp}}"
              location_id: "loc_n14"
              uri_id: "uri_n14"
              key_id: "{{uk_id}}"
        expected_status: [400, 422]
        validate:
          - field: "error"
            contains: ["DNS", "domain", "validation"]

  - id: "N15"
    name: "V3 PATCH on SUSPENDED participant"
    description: "Try V3 update when participant is suspended"
    steps:
      - name: "Create SUBSCRIBED participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "v3_suspended_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_n15"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N15 Suspended Test"
          contacts:
            - contact_id: "contact_auth_n15"
              type: "AUTHORISED_SIGNATORY"
              name: "N15 Auth"
              email: "n15@example.com"
              phone: "+919876543015"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_n15"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_n15"
            type: "CALLBACK"
            url: "https://n15.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "v3_suspended_{{timestamp}}"
              location_id: "loc_n15"
              uri_id: "uri_n15"
              key_id: "{{uk_id}}"
        expected_status: 200
      
      - name: "Admin suspends"
        method: "PATCH"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "v3_suspended_{{timestamp}}"
          action: "SUSPENDED"
        expected_status: 200
      
      - name: "V3 PATCH attempt (should fail)"
        method: "PATCH"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          participant_id: "v3_suspended_{{timestamp}}"
          uk_id: "{{uk_id}}"
          contacts:
            - contact_id: "contact_auth_n15"
              type: "AUTHORISED_SIGNATORY"
              name: "N15 Auth Updated"
              email: "n15-updated@example.com"
              phone: "+919123456015"
        expected_status: [403, 422]
        validate:
          - field: "error"
            contains: ["suspended", "not allowed"]

  - id: "N16"
    name: "V3 POST invalid config (domain not whitelisted)"
    description: "Try V3 subscription for domain not whitelisted by admin"
    steps:
      - name: "Admin whitelists one domain"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "domain_mismatch_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "domain_mismatch_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 tries to subscribe different domain"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          uk_id: "{{uk_id}}"
          participant_id: "domain_mismatch_{{timestamp}}"
          credentials:
            - cred_id: "cred_gst_n16"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N16 Domain Test"
          contacts:
            - contact_id: "contact_auth_n16"
              type: "AUTHORISED_SIGNATORY"
              name: "N16 Auth"
              email: "n16@example.com"
              phone: "+919876543016"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_n16"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_n16"
            type: "CALLBACK"
            url: "https://n16.example.com/callback"
          configs:
            - domain: "ONDC:RET15"
              np_type: "BAP"
              subscriber_id: "domain_mismatch_{{timestamp}}"
              location_id: "loc_n16"
              uri_id: "uri_n16"
              key_id: "{{uk_id}}"
        expected_status: [403, 422]
        validate:
          - field: "error"
            contains: ["domain", "not whitelisted", "not allowed"]

  - id: "N17"
    name: "V3 PATCH invalid field values"
    description: "Try V3 update with invalid field formats"
    steps:
      - name: "Create SUBSCRIBED participant"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "v3_invalid_patch_{{timestamp}}"
          action: "SUBSCRIBED"
          credentials:
            - cred_id: "cred_gst_n17"
              type: "GST"
              cred_data:
                gstin: "29ABCDE1234F1Z5"
                legal_name: "N17 Patch Test"
          contacts:
            - contact_id: "contact_auth_n17"
              type: "AUTHORISED_SIGNATORY"
              name: "N17 Auth"
              email: "n17@example.com"
              phone: "+919876543017"
          key:
            uk_id: "{{uk_id}}"
            signing_public_key: "{{signing_public_key}}"
            encryption_public_key: "{{encryption_public_key}}"
            signed_algorithm: "ED25519"
            encryption_algorithm: "X25519"
            valid_from: "{{valid_from}}"
            valid_until: "{{valid_until}}"
          location:
            location_id: "loc_n17"
            type: "SERVICEABLE"
            country: "IND"
            city: ["std:080"]
          uri:
            uri_id: "uri_n17"
            type: "CALLBACK"
            url: "https://n17.example.com/callback"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "v3_invalid_patch_{{timestamp}}"
              location_id: "loc_n17"
              uri_id: "uri_n17"
              key_id: "{{uk_id}}"
        expected_status: 200
      
      - name: "V3 PATCH with invalid email"
        method: "PATCH"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          request_id: "{{request_id}}"
          participant_id: "v3_invalid_patch_{{timestamp}}"
          uk_id: "{{uk_id}}"
          contacts:
            - contact_id: "contact_auth_n17"
              type: "AUTHORISED_SIGNATORY"
              name: "N17 Auth"
              email: "invalid-email"
              phone: "+919876543017"
        expected_status: [400, 422]

  - id: "N18"
    name: "V3 POST missing request_id"
    description: "Try V3 request without mandatory request_id"
    steps:
      - name: "V3 request without request_id"
        method: "POST"
        endpoint: "/api/v3/subscribe"
        auth_type: "v3"
        data:
          uk_id: "{{uk_id}}"
          participant_id: "missing_reqid_{{timestamp}}"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "missing_reqid_{{timestamp}}"
        expected_status: [400, 422]
        validate:
          - field: "error"
            contains: ["request_id", "required"]

  - id: "N19"
    name: "V3 POST mismatched uk_id"
    description: "Try V3 request where uk_id doesn't match signature"
    steps:
      - name: "Admin whitelists"
        method: "POST"
        endpoint: "/admin/subscribe"
        auth_type: "admin"
        data:
          participant_id: "mismatched_ukid_{{timestamp}}"
          action: "WHITELISTED"
          configs:
            - domain: "ONDC:RET1A"
              np_type: "BPP"
              subscriber_id: "mismatched_ukid_{{timestamp}}"
        expected_status: 200
      
      - name: "V3 request with mismatched uk_id"
